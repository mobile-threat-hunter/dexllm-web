<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>dexllm — in-browser DEX/APK decompiler</title>
<style>
  :root {
    --bg:#000000; --panel:#0a0a0c; --border:#26262b; --fg:#c9d1d9;
    --muted:#8b949e; --accent:#58a6ff; --ok:#3fb950; --bad:#f85149;
    --hl:#1f6feb33;
  }
  * { box-sizing:border-box; }
  html,body { height:100%; margin:0; }
  body {
    background:var(--bg); color:var(--fg); font:13px/1.5 "SF Mono",
    ui-monospace,"Cascadia Code",Menlo,Consolas,monospace;
    display:flex; flex-direction:column;
  }
  header {
    padding:10px 16px; border-bottom:1px solid var(--border);
    background:var(--panel); display:flex; align-items:center; gap:14px;
    flex-wrap:wrap;
  }
  header h1 { font-size:15px; margin:0; font-weight:600; }
  header h1 span { color:var(--accent); }
  .ver {
    font-size:11px; color:var(--muted); text-decoration:none;
    padding:2px 7px; border:1px solid var(--border); border-radius:10px;
    font-family:inherit; white-space:nowrap;
  }
  .ver:hover { color:var(--accent); border-color:var(--accent); }
  .ver code { font:inherit; color:var(--fg); }
  .sub { color:var(--muted); font-size:11px; }
  #status { margin-left:auto; font-size:12px; color:var(--muted); }
  #status b { color:var(--fg); }
  .pill { padding:1px 7px; border-radius:10px; font-size:11px; }
  .pill.ok { background:#23863633; color:var(--ok); }
  .pill.bad { background:#da363333; color:var(--bad); }

  #drop {
    flex:1; display:flex; align-items:center; justify-content:center;
    cursor:pointer; text-align:center; padding:24px;
  }
  #drop input { display:none; }
  /* the small drop card — dashed box holding the looping clip + instructions */
  #dropcard {
    display:flex; flex-direction:column; align-items:center; gap:10px;
    padding:18px; border:2px dashed var(--border); border-radius:14px;
    color:var(--muted); width:max-content; max-width:90vw;
  }
  #drop.drag #dropcard { border-color:var(--accent); background:var(--hl); color:var(--fg); }
  #dropcard .big { font-size:16px; color:var(--fg); }
  #dropcard div:last-child { font-size:12px; }
  #loopvid, #transvid {
    width:300px; max-width:72vw; aspect-ratio:1/1; border-radius:10px;
    border:none; box-shadow:none; display:block;
    object-fit:cover; background:#000; pointer-events:none;
  }
  #transvid { display:none; }   /* shown only as the drop→browse transition */
  @media (max-width:720px) { #loopvid, #transvid { width:220px; } }

  main { flex:1; display:none; min-height:0; }
  main.show { display:flex; }
  #sidebar {
    width:380px; min-width:240px; border-right:1px solid var(--border);
    display:flex; flex-direction:column; background:var(--panel);
  }
  #search {
    margin:8px; padding:7px 9px; background:var(--bg); border:1px solid var(--border);
    color:var(--fg); border-radius:6px; font:inherit;
  }
  #search:focus { outline:none; border-color:var(--accent); }
  #count { padding:0 12px 6px; color:var(--muted); font-size:11px; }
  /* header mode toggle — segmented Runtime / Isolated control, appears once
     an APK is loaded. Runtime is the packer-unpack workflow (aggregate +
     priority); Isolated shows each dex independently. */
  #modetoggle {
    display:none; align-items:center; gap:0; margin-left:14px;
    border:1px solid var(--border); border-radius:7px; overflow:hidden;
    background:#0a0a0c;
  }
  #modetoggle.show { display:inline-flex; }
  .mt {
    flex:none; padding:5px 11px; border:0; background:transparent;
    color:var(--muted); cursor:pointer;
    font:11px/1.3 ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, "Helvetica Neue", Arial;
    transition: background 140ms ease, color 140ms ease;
    border-right:1px solid var(--border);
  }
  .mt:last-child { border-right:0; }
  .mt:hover { background:#ffffff10; color:var(--fg); }
  .mt.sel {
    background:linear-gradient(180deg, #5fb1ff 0%, #4096ff 100%);
    color:#000914; font-weight:600;
    box-shadow:0 1px 4px rgba(88,166,255,0.35) inset, 0 1px 0 rgba(255,255,255,0.15) inset;
  }
  .mt .ico { margin-right:5px; opacity:0.85; }

  /* per-dex tabs — Chrome-style, pinned to the TOP of the workspace just
     under the header (above the class browser + viewer). Spans the full width
     of the page; the active tab's background matches the main content area
     below so it "merges" with no bottom seam. The strip scrolls horizontally
     instead of wrapping so a many-dex multi-source load stays readable. */
  #dexbar {
    display:none; align-items:flex-end; gap:0; padding:6px 12px 0;
    border-bottom:1px solid var(--border);
    background:linear-gradient(180deg, #08080a 0%, #050507 100%);
    overflow-x:auto; overflow-y:hidden; scrollbar-width:thin;
    flex:none; min-height:36px;
  }
  #dexbar.show { display:flex; }
  #dexbar::-webkit-scrollbar { height:5px; }
  #dexbar::-webkit-scrollbar-thumb { background:#ffffff14; border-radius:3px; }
  .dextab {
    flex:none; padding:7px 14px 8px; border:1px solid var(--border);
    border-radius:9px 9px 0 0;
    background:linear-gradient(180deg, #0e0e12 0%, #0a0a0c 100%);
    color:var(--muted); cursor:pointer; position:relative;
    font:12px/1.3 ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, "Helvetica Neue", Arial;
    white-space:nowrap; max-width:240px; overflow:hidden; text-overflow:ellipsis;
    bottom:-1px;             /* drop 1px to overlap the bar's bottom border */
    transition: background 140ms ease, color 140ms ease, transform 80ms ease;
  }
  .dextab + .dextab { margin-left:-1px; }   /* tabs share a vertical edge */
  .dextab:hover { background:linear-gradient(180deg, #1a1a22 0%, #15151a 100%); color:var(--fg); z-index:1; }
  .dextab:active { transform:translateY(0.5px); }
  .dextab.sel {
    background:var(--bg);                    /* matches main content background */
    color:var(--fg);
    border-bottom:1px solid var(--bg);       /* hide the seam under the tab */
    font-weight:600;
    z-index:2;
    box-shadow:0 -2px 0 var(--accent) inset; /* a slim accent underline on the tab top edge */
  }
  .dextab.dump { color:#ff9a8c; }
  .dextab.dump.sel { color:#ff9a8c; box-shadow:0 -2px 0 var(--bad) inset; }
  .dextab.bad { color:var(--bad); text-decoration:line-through; }
  .dextab .n {
    display:inline-block; margin-left:6px; padding:1px 6px;
    background:#ffffff14; border-radius:8px; font-size:10px;
    color:var(--muted); font-weight:normal;
  }
  .dextab.sel .n { background:var(--hl); color:var(--fg); }
  .dextab .ico { margin-right:5px; opacity:0.8; }
  #adddex {
    flex:none; margin-left:6px; padding:4px 10px;
    border:1px dashed var(--border); border-radius:6px;
    background:transparent; color:var(--muted); cursor:pointer;
    font:12px/1.3 ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, "Helvetica Neue", Arial;
    align-self:center;
  }
  #adddex:hover { color:var(--fg); border-color:var(--accent); }
  #adddex:disabled { opacity:0.4; cursor:wait; }
  #adddexfile { display:none; }

  /* compact spinner used during async decompile (CSS keyframes run on the
     compositor thread, so they keep ticking even if the main thread is busy
     with synchronous wasm calls outside the worker). */
  .spin {
    display:inline-block; width:10px; height:10px; margin-right:6px;
    border:2px solid var(--muted); border-top-color:transparent;
    border-radius:50%; vertical-align:-1px;
    animation: dexllm-spin 0.7s linear infinite;
  }
  @keyframes dexllm-spin { to { transform: rotate(360deg); } }
  #classlist { overflow:auto; flex:1; }
  .cls {
    padding:4px 12px; cursor:pointer; white-space:nowrap; overflow:hidden;
    text-overflow:ellipsis; border-left:2px solid transparent;
  }
  .cls:hover { background:#ffffff0a; }
  .cls.sel { background:var(--hl); border-left-color:var(--accent); color:#fff; }
  .pkg {
    padding:4px 12px; cursor:pointer; white-space:nowrap; overflow:hidden;
    text-overflow:ellipsis; user-select:none;
  }
  .pkg:hover { background:#ffffff0a; }
  .pkg .tw { display:inline-block; width:12px; color:var(--muted); }
  .pkg .pl { color:#d2a8ff; }
  .pkg .cnt { color:var(--muted); font-size:11px; margin-left:7px; }

  /* ---- IOC (static C2 / network-indicator) markers ---- */
  .ioc-badge {
    display:inline-block; margin-left:7px; padding:0 6px; border-radius:9px;
    font-size:10px; font-weight:600; line-height:16px; vertical-align:middle;
    background:#da363333; color:var(--bad); border:1px solid #f8514955;
  }
  .pkg .ioc-badge { font-weight:500; }
  #iocbar {
    border-bottom:1px solid var(--border); background:var(--panel); padding:0;
    max-height:30vh; overflow:auto;
  }
  #iocbar.empty { display:none; }
  #iocbar .iochd {
    padding:7px 14px; color:var(--muted); font-size:11px;
    display:flex; align-items:center; gap:8px; flex-wrap:wrap;
  }
  #iocbar .iochd b { color:var(--bad); }
  .iocrow { padding:3px 14px 3px 14px; display:flex; gap:8px; align-items:baseline; }
  .iocrow .cat {
    flex:0 0 64px; text-align:right; font-size:10px; text-transform:uppercase;
    letter-spacing:.04em; padding-top:1px;
  }
  .iocrow .vals { display:flex; flex-wrap:wrap; gap:5px; }
  .iocpill {
    font-size:11px; padding:1px 7px; border-radius:10px; word-break:break-all;
    border:1px solid var(--border); background:#000;
  }
  .iocpill.copied { outline:1px solid var(--accent); }
  .cat-urls,   .iocpill.urls   { color:#f85149; }
  .cat-ips,    .iocpill.ips    { color:#ffa657; }
  .cat-domains,.iocpill.domains{ color:#e3b341; }
  .cat-onion,  .iocpill.onion  { color:#d2a8ff; }
  .cat-emails, .iocpill.emails { color:#56d4dd; }
  .iocpill.urls{border-color:#f8514955;} .iocpill.ips{border-color:#ffa65755;}
  .iocpill.domains{border-color:#e3b34155;} .iocpill.onion{border-color:#d2a8ff55;}
  .iocpill.emails{border-color:#56d4dd55;}

  /* ---- right-side panels: network indicators + dangerous permissions ---- */
  #rightcol {
    width:340px; min-width:240px; border-left:1px solid var(--border);
    display:flex; flex-direction:column; min-height:0;
  }
  .sidepanel {
    flex:1 1 0; min-height:0; background:var(--panel);
    display:flex; flex-direction:column; overflow:hidden;
  }
  .sidepanel + .sidepanel { border-top:1px solid var(--border); }
  .sidepanel.empty { display:none; }
  .iocphd {
    padding:9px 12px; border-bottom:1px solid var(--border); font-size:12px;
    color:var(--fg); display:flex; align-items:center; gap:8px;
  }
  .ipcount {
    background:#da363333; color:var(--bad); border:1px solid #f8514955;
    border-radius:9px; padding:0 7px; font-size:11px; font-weight:600;
  }
  .pfilter {
    margin:8px; padding:6px 9px; background:var(--bg); border:1px solid var(--border);
    color:var(--fg); border-radius:6px; font:inherit;
  }
  .pfilter:focus { outline:none; border-color:var(--accent); }
  .pbody { overflow:auto; flex:1; padding-bottom:8px; }
  .permsec {
    padding:8px 12px 4px; font-size:10px; text-transform:uppercase;
    letter-spacing:.05em; color:var(--bad);
  }
  .permhd {
    padding:5px 12px 2px; font-size:11px; color:#e3b341; font-weight:600;
    position:sticky; top:0; background:var(--panel);
  }
  .iocitem.perm .ival { color:#ffa657; }
  .iocgrp {
    padding:7px 12px 3px; font-size:10px; text-transform:uppercase;
    letter-spacing:.05em; position:sticky; top:0; background:var(--panel);
  }
  .iocitem {
    display:flex; align-items:baseline; gap:8px; padding:4px 12px; cursor:pointer;
    border-left:2px solid transparent;
  }
  .iocitem:hover { background:#ffffff0a; border-left-color:var(--accent); }
  .iocitem .ival { flex:1; word-break:break-all; font-size:12px; }
  .iocitem .icnt { color:var(--muted); font-size:11px; white-space:nowrap; }
  .iocitem.urls .ival{color:#f85149;} .iocitem.ips .ival{color:#ffa657;}
  .iocitem.domains .ival{color:#e3b341;} .iocitem.onion .ival{color:#d2a8ff;}
  .iocitem.emails .ival{color:#56d4dd;}
  .isub { background:#000; border-left:2px solid var(--accent); }
  .isubitem {
    padding:4px 12px 4px 22px; font-size:11px; color:var(--muted); cursor:pointer;
    white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
  }
  .isubitem:hover { background:#ffffff0a; color:var(--fg); }
  .isubhint { padding:2px 12px 4px 22px; font-size:10px; color:var(--muted); }

  #viewer { flex:1; display:flex; flex-direction:column; min-width:0; }
  #vhead {
    padding:8px 14px; border-bottom:1px solid var(--border); color:var(--muted);
    font-size:12px; display:flex; gap:10px; align-items:center;
  }
  #vhead .name { color:var(--fg); }
  #code { flex:1; overflow:auto; margin:0; padding:14px 18px; white-space:pre;
    tab-size:4; -webkit-overflow-scrolling:touch; position:relative;
    color:var(--fg); }   /* default fg for punctuation/braces; tokens use .tk-* */
  /* huge classes are split into chunks; offscreen ones skip layout/paint */
  #code .chunk { display:block; content-visibility:auto; }
  /* highlighted line: a single absolutely-positioned overlay, statically colored */
  #glowline {
    position:absolute; left:0; right:0; display:none; pointer-events:none;
    background:#1f6feb55; border-left:2px solid var(--accent);
  }
  #glowline.on { display:block; }
  .placeholder { color:var(--muted); padding:24px; }
  a { color:var(--accent); }

  /* ---- Java syntax highlight tokens (hues spread across the wheel) ---- */
  .tk-key { color:#ff7b72; }                       /* keywords     — red    */
  .tk-typ { color:#ffa657; }                       /* type/class   — orange */
  .tk-ann { color:#e3b341; }                       /* @annotation  — gold   */
  .tk-str { color:#7ee787; }                       /* strings      — green  */
  .tk-con { color:#56d4dd; }                       /* CONSTANTS    — cyan   */
  .tk-num { color:#79c0ff; }                       /* numbers      — blue   */
  .tk-fun { color:#d2a8ff; }                       /* methods      — purple */
  .tk-var { color:#9cdcfe; }                       /* variables/fields — light blue */
  .tk-lit { color:#f778ba; font-style:italic; }    /* true/false/null — magenta */
  .tk-com { color:#8b949e; font-style:italic; }    /* comments     — gray   */

  /* ---- mobile / narrow screens ---- */
  @media (max-width:720px) {
    body { font-size:12px; }
    header { padding:8px 12px; gap:8px; }
    header h1 { font-size:14px; }
    .sub { flex-basis:100%; order:3; }
    #status { margin-left:0; flex-basis:100%; order:4; }
    #drop { margin:14px; }
    #drop .big { font-size:16px; }

    /* stack the three regions and let the page scroll, with each region a
       fixed height + its own inner scroll, so classes, code and the
       IoC/permission panels are all reachable on mobile. */
    main.show { flex-direction:column; overflow-y:auto; }
    #sidebar {
      width:auto; min-width:0; flex:none; height:36vh;
      border-right:none; border-bottom:1px solid var(--border);
    }
    #viewer { width:auto; min-height:0; flex:none; height:60vh; }
    #code { padding:12px 14px; }
    .cls, .pkg { padding:7px 12px; }   /* bigger touch targets */
    #rightcol {
      width:auto; min-width:0; flex:none; height:auto; max-height:none; order:5;
      border-left:none; border-top:1px solid var(--border);
    }
    .sidepanel { flex:none; height:38vh; }   /* each panel fixed + inner scroll */
  }
</style>
</head>
<body>
<header>
  <h1>dex<span>llm</span></h1>
  <a class="ver" href="https://github.com/mobile-threat-hunter/dex-analyzer-for-llm/commit/7722f34"
     target="_blank" rel="noopener" title="dexllm commit this WASM was built from">
    v0.1.6 · <code>7722f34</code>
  </a>
  <!-- mode toggle: Runtime = packer-unpack workflow (multi-source, dump
       priority, [all] aggregate). Isolated = each dex as its own tab, no
       priority resolution, no aggregate. Shown only after an APK loads. -->
  <div id="modetoggle">
    <button class="mt sel" type="button" data-mode="runtime"
      title="Aggregate view with first-wins resolution. Dumped dexes win class collisions over the original APK (packer unpack workflow).">
      <span class="ico">▦</span>Runtime
    </button>
    <button class="mt" type="button" data-mode="isolated"
      title="Each dex shown independently as its own tab. No aggregate, no priority resolution — inspect each classes*.dex in isolation.">
      <span class="ico">◫</span>Isolated
    </button>
  </div>
  <span class="sub">in-browser DEX / APK decompiler · runs entirely on your device (WASM)</span>
  <div id="status">loading engine…</div>
</header>

<label id="drop" for="file">
  <div id="dropcard">
    <video id="loopvid" autoplay muted loop playsinline disablepictureinpicture preload="auto">
      <source src="loop.mp4" type="video/mp4">
    </video>
    <video id="transvid" muted playsinline disablepictureinpicture preload="auto">
      <source src="trans.mp4" type="video/mp4">
    </video>
    <div class="big">⬇ Drop a <b>.apk</b> / <b>.dex</b> / <b>.jar</b> here</div>
    <div>or click to choose a file — nothing is uploaded, decompilation runs locally</div>
  </div>
  <input id="file" type="file" accept=".apk,.dex,.jar,.zip,application/octet-stream">
</label>

<!-- Per-dex tab bar — Chrome-style, sits at the top of the workspace (above
     the class browser). Tabs appear once an APK is loaded: [all] for the
     aggregated view, one tab per classes*.dex inside the APK, plus one tab per
     dumped dex (drag-drop or via "+ dex"). Dumped dexes are loaded with
     priority (first-wins, mirrors ART when a packer unpacks a decrypted dex),
     so their classes WIN collisions with the original APK. -->
<div id="dexbar">
  <button id="adddex" type="button" title="Add a runtime-dumped .dex/.apk on top (prefer=true → its classes win collisions)">+ dex</button>
  <input id="adddexfile" type="file" accept=".dex,.apk,.jar,.zip,application/octet-stream" multiple>
</div>

<main id="main">
  <div id="sidebar">
    <input id="search" placeholder="filter classes…" autocomplete="off">
    <div id="count"></div>
    <div id="classlist"></div>
  </div>
  <div id="viewer">
    <div id="vhead"><span class="name" id="vname">— select a class —</span>
      <span id="vmeta"></span></div>
    <div id="iocbar" class="empty"></div>
    <pre id="code"><div class="placeholder">Pick a class on the left to decompile it.</div></pre>
  </div>
  <div id="rightcol">
    <div id="iocpanel" class="sidepanel empty">
      <div class="iocphd" id="iocphd">network indicators</div>
      <input id="iocfilter" class="pfilter" placeholder="filter indicators…" autocomplete="off">
      <div id="iocpanelbody" class="pbody"></div>
    </div>
    <div id="permpanel" class="sidepanel empty">
      <div class="iocphd" id="permhd2">dangerous permissions</div>
      <input id="permfilter" class="pfilter" placeholder="filter APIs / callers…" autocomplete="off">
      <div id="permpanelbody" class="pbody"></div>
    </div>
  </div>
</main>

<!-- Cache-bust both dexllm.js and dexllm.wasm by the dexllm commit SHA. Keeping
     the JS+WASM pair consistent matters because a returning visitor whose
     browser has the old dexllm.js cached but pulls the new dexllm.wasm gets
     an ABI mismatch and "engine load failed". Bump this when the WASM is
     rebuilt — it MUST match the version pill above. -->
<script>window.__DEXLLM_BUILD = "7722f34";</script>
<script src="dexllm.js?v=7722f34"></script>
<script>
let Module = null, dk = null, allClasses = [], selectedEl = null;
// classDescriptor -> { urls:Set, ips:Set, domains:Set, emails:Set, onion:Set }
let classIoc = new Map();
let iocTotals = null;            // { urls, ips, domains, emails, onion, total }
let iocIndex = [];               // [{ value, cat, classes:[descriptor,…] }] — for the global panel
let permIndex = [];              // [{ perm, api, callers:[methodDescriptor,…] }] — dangerous-permission callers
let permTotals = null;           // { perms, apis, callers }
let permPending = false;         // true while the deferred caller analysis runs
let dangerMap = null;            // permission -> [pkg.Class#method] (AOSP dangerous slice), fetched once

// ── multi-source state ──────────────────────────────────────────────────────
// Track every source the current DexKit was built from so we can rebuild when
// the user adds a runtime-dumped dex. Sources are loaded in priority order:
// dumps FIRST, original APK last → ART-style first-wins makes the dumped class
// win a collision (mirrors the packer-unpack workflow described in
// dexllm.add_dumped_dexes).
//
// Decompile-time per-source routing (so the user can see the LOSER of a cross-
// source first-wins collision) lives in the worker — it owns the per-source
// DexKits. On the main thread we just need each source's vfs/label/slotCount
// + the dexInfo→sourceIdx map (already in `dexInfo[i].sourceIdx`).
let originalSource = null;       // {vfs, label, slotCount, baseDexId}
let dumpedSources  = [];         // [{vfs, label, slotCount, baseDexId}, …]
const vfsBytes = new Set();      // vfs paths held in MEMFS (path tracking only)
let dexInfo = [];                // per-dex: [{dex_id, name, valid, reason, sourceLabel, dump, count, sourceIdx, localDexId}]
let selectedDex = "all";         // "all" | <dex_id:number>; class list filter
let dexClasses = new Map();      // dex_id -> [classDescriptor, …] (from listClassesInDex; no dedup)
let viewMode = "runtime";        // "runtime" | "isolated"
// Runtime = the running-on-ART state. classes*.dex of the APK loaded in their
//   declared order, then dumped dexes patched on top (dumps win class
//   collisions, mirroring ART after a packer unpack). Aggregate [all] tab +
//   per-dex tabs. IoC / dangerous-perm panels show the WHOLE app's view.
// Isolated = every .dex (APK's classes*.dex + each dump) loaded into its
//   OWN single-dex WasmDexKit — truly isolated, no first-wins, no
//   aggregation. Each tab = one dex's universe; IoC + dangerous-perm panels
//   show ONLY that dex's indicators, recomputed per tab.

// Isolated-mode per-dex state. Key = aggregated dex_id (number) for
// regular dexes from the loaded APK, or a synthetic "x<N>" string for
// isolated-only extras the user added via "+ dex" while in isolated.
// {dk, classes, ioc:{classIoc,iocIndex,iocTotals}, perm:{permIndex,permTotals}, permLoaded}
let isolated = new Map();
let nextExtraKey = 1;            // counter for "x1", "x2", ... synthetic keys

// Runtime-mode panel snapshot — captured when leaving runtime, restored when
// switching back so the heavy first-load computation isn't redone.
let runtimePanelSnap = null;
const $ = s => document.querySelector(s);
const statusEl = $("#status");

// ---- static network-IOC (C2) extraction ----------------------------------
// Port of dexllm.ioc.extract_iocs (src/dexllm/ioc.py). Pipeline:
//   dk.listValueStrings()                  // const-string + static VALUE_STRING only
//     -> refang (literal, O(n))            // hxxp:// , [.] , [at] , [dot] , ...
//     -> bounded regexes                   // URL / IPv4 / email / onion (ReDoS-safe)
//     -> bare-host candidate + PSL gate    // word-gTLD collisions rejected
//     -> denoise (dex pkgs + xmlns + RDN)  // residual identifier hosts
//     -> batched L7 xref to classes        // "where in the code"
//
// dexllm proper uses tldextract/PSL; we don't ship a PSL in the browser, so the
// equivalent gate is a curated `IOC_TLDS` + the `_NONHOST_SUFFIXES` reject set
// (word-like gTLDs that collide with Java identifiers — `os.name`, `*.support`,
// codec ids, MIME). A scheme-qualified URL bypasses the gate (`://` proves intent).
const IOC_CATS = ["urls", "ips", "domains", "emails", "onion"];
const MAX_SCAN = 65536;            // per-string cap — bounds adversarial-blob cost
// Per-string scan cap. Real network IOCs are short; an oversized blob is itself a
// signal, not a host. Bounds worst-case cost on an adversarial APK.

// Defang markers -> their refanged form. LITERAL str.replace only (O(n), ReDoS-
// immune). Order matters where one marker is a prefix of another (e.g. `[://]`
// before `[:]` — both contain `[:]` but `[://]` is more specific).
const DEFANG_PAIRS = [
  ["[://]", "://"],
  ["[.]", "."], ["(.)", "."], ["{.}", "."],
  ["[dot]", "."], ["(dot)", "."], [" dot ", "."],
  ["[:]", ":"],
  ["[at]", "@"], ["(at)", "@"], [" at ", "@"],
  ["hxxps", "https"], ["hxxp", "http"], ["fxp", "ftp"],
  ["\\", "/"],
];
function refang(s) { for (const [m, r] of DEFANG_PAIRS) if (s.indexOf(m) !== -1) s = s.split(m).join(r); return s; }

const RE_URL   = /\b(?:https?|ftp|wss?):\/\/[^\s"'<>\\]+/gi;
// Bounded email — every quantifier capped so a long non-match can't drive
// catastrophic backtracking (dex value-strings can be huge blobs).
const RE_EMAIL = /(?<![A-Za-z0-9._%+\-])[A-Za-z0-9._%+\-]{1,64}@[A-Za-z0-9.\-]{1,253}\.[A-Za-z]{2,24}\b/g;
// Dotted-quad IPv4 with negative lookbehind on `digit` / `digit.` and negative
// lookahead on `.?digit` — rejects a version slice like `1.0.0.0.5` without
// dropping a valid IP merely followed by a dot.
const RE_IPV4  = /(?<!\d)(?<!\d\.)(?:(?:25[0-5]|2[0-4]\d|1?\d?\d)\.){3}(?:25[0-5]|2[0-4]\d|1?\d?\d)(?::\d{1,5})?(?!\.?\d)/g;
const RE_ONION = /\b[a-z2-7]{16}(?:[a-z2-7]{40})?\.onion\b/gi;
// Loose bare-host candidate: labels then an alphabetic tail (2-24 chars). The
// real gate is the curated TLD set + the word-gTLD reject set below. ReDoS-safe.
const RE_HOST  = /\b(?:[a-z0-9][a-z0-9-]{0,62}\.){1,32}[a-z]{2,24}\b/gi;

// Curated TLD set (substitutes for the bundled PSL in dexllm proper). Kept
// intentionally wide on word-like ccTLDs and abuse-popular gTLDs.
const IOC_TLDS = new Set((
  "com|net|org|io|cn|ru|info|top|xyz|app|me|co|tk|cc|biz|site|online|club|" +
  "vip|pw|su|ws|cm|tv|gg|sh|dev|live|store|shop|fun|click|link|host|space|" +
  "pro|mobi|asia|uk|de|fr|jp|kr|in|br|us|nl|eu|ir|kz|ua|by|ng|id|vn|th|ph|" +
  "ly|icu|ai|cloud|to|ga|cf|ml|gq|pl|tr|hk|tw|sg|au|ca|es|it|se|fi|no|dk|" +
  "ch|at|be|cz|gr|ro|ua|il|sa|ae|za|mx|ar|cl|pe|edu|gov|mil|int|monster|" +
  "best|today|world|press|pizza|rest|wtf|loan|trade|date|stream|party|men"
).split("|"));

// Public suffixes that ARE real TLDs but, in a dex, almost always appear as the
// tail of a Java identifier path rather than a contacted host (`os.name`,
// `Matcher.group`, `*.support`, codec ids). A bare-domain candidate ending in
// one is dropped; a scheme-qualified URL keeps its host regardless. Mirrors
// ioc.py `_NONHOST_SUFFIXES`.
const NONHOST_SUFFIXES = new Set([
  "name", "one", "group", "read", "support", "secure", "info", "run",
  "google", "ms", "java", "type", "prod", "build", "now", "new", "win",
  "men", "review", "country", "kim", "mov", "zip", "foo", "bar",
]);

const RDN_ROOTS = new Set("com org net edu gov mil int".split(" "));
const PLATFORM_ROOTS = new Set("android androidx java javax kotlin kotlinx dalvik sun junit".split(" "));
const DROP_ROOTS = new Set([...RDN_ROOTS, ...PLATFORM_ROOTS]);
// XML-namespace / schema authority hosts — xmlns identifiers, never contacted.
const NAMESPACE_HOSTS = new Set([
  "schemas.android.com", "schemas.xmlsoap.org", "schemas.microsoft.com",
  "schemas.openxmlformats.org", "xmlpull.org", "www.xmlpull.org",
  "www.w3.org", "w3.org", "java.sun.com", "ns.adobe.com", "purl.org",
]);
const PKG_LABEL = /^[a-z0-9_$]+$/;

function dexPackagePrefixes(descriptors) {
  const pkgs = new Set();
  for (const s of descriptors) {
    const core = s.replace(/^\[+/, "");                       // arrays: [Lx; -> Lx;
    if (!(core.startsWith("L") && core.endsWith(";") && core.includes("/"))) continue;
    const labels = core.slice(1, -1).split("/").slice(0, -1).map(p => p.toLowerCase());
    if (!labels.length || !labels.every(p => PKG_LABEL.test(p))) continue;
    for (let i = 1; i <= labels.length; i++) pkgs.add(labels.slice(0, i).join("."));
  }
  return pkgs;
}
const isPackageLike = (host, pkgs) => {
  const low = host.toLowerCase();
  return NAMESPACE_HOSTS.has(low) || pkgs.has(low) || DROP_ROOTS.has(low.split(".")[0]);
};
// Drop userinfo (`user:pass@`) so the real C2 host is extracted, and drop port.
function hostOf(url) {
  const rest = url.split("://")[1] || "";
  let authority = (rest.split("/")[0] || "").split("?")[0].split("#")[0];
  const at = authority.lastIndexOf("@");
  if (at !== -1) authority = authority.slice(at + 1);
  if (authority.startsWith("[") && authority.indexOf("]") !== -1) {
    return authority.slice(1, authority.indexOf("]")).toLowerCase();
  }
  return authority.split(":")[0].toLowerCase();
}
// PSL stand-in: host is a registered-domain candidate if its tail is in our TLD
// set AND not one of the word-gTLDs that collide with Java identifiers in a dex.
function validDomain(host) {
  const labels = host.split(".");
  if (labels.length < 2) return false;
  const tail = labels[labels.length - 1];
  if (!IOC_TLDS.has(tail)) return false;
  if (NONHOST_SUFFIXES.has(tail)) return false;
  return true;
}

function classifyStrings(strings, dexPkgs) {
  const b = { urls:new Set(), ips:new Set(), domains:new Set(), emails:new Set(), onion:new Set() };
  for (const raw of strings) {
    const capped = raw.length <= MAX_SCAN ? raw : raw.slice(0, MAX_SCAN);
    const s = refang(capped);
    let m;
    RE_URL.lastIndex = 0;
    while ((m = RE_URL.exec(s))) {
      const url = m[0].replace(/[.,);"']+$/, "");
      if (NAMESPACE_HOSTS.has(hostOf(url))) continue;          // xmlns URI, not a contacted endpoint
      b.urls.add(url);
    }
    RE_ONION.lastIndex = 0; while ((m = RE_ONION.exec(s))) b.onion.add(m[0].toLowerCase());
    RE_IPV4.lastIndex  = 0; while ((m = RE_IPV4.exec(s)))  b.ips.add(m[0]);
    RE_EMAIL.lastIndex = 0; while ((m = RE_EMAIL.exec(s))) b.emails.add(m[0]);
    RE_HOST.lastIndex  = 0;
    while ((m = RE_HOST.exec(s))) {
      const host = m[0].toLowerCase();
      if (host.endsWith(".onion")) continue;                  // its own bucket
      if (!validDomain(host)) continue;                       // PSL/word-gTLD gate
      if (isPackageLike(host, dexPkgs)) continue;             // residual identifier
      b.domains.add(host);
    }
  }
  // A URL's own host is high-confidence (scheme proves intent) — fold in, but
  // skip IP-literal hosts (those are in `ips`) and onion (own category). Bypass
  // the word-gTLD gate; PSL structure check stays.
  for (const u of b.urls) {
    const h = hostOf(u);
    if (!h.includes(".")) continue;
    if (h.endsWith(".onion")) continue;
    if (/^\d{1,3}(?:\.\d{1,3}){3}$/.test(h)) continue;
    const tail = h.split(".").pop();
    if (!IOC_TLDS.has(tail)) continue;
    if (isPackageLike(h, dexPkgs)) continue;
    b.domains.add(h);
  }
  return b;
}

// Run the whole pipeline against the loaded dk; populates classIoc + iocTotals.
function computeIocs(dkInst, descriptors) {
  classIoc = new Map();
  iocIndex = [];
  const dexPkgs = dexPackagePrefixes(descriptors);
  // dexllm 0.1.6+: list_strings was removed (identifier noise — type/method/
  // field names polluted the IOC feed). list_value_strings yields only the
  // strings the app loads AS DATA: const-string (0x1a/0x1b) operands + static
  // VALUE_STRING (0x17) field initializers, MUTF-8 → UTF-8 decoded.
  const sv = dkInst.listValueStrings();
  const strings = [];
  for (let i = 0; i < sv.size(); i++) strings.push(sv.get(i));
  sv.delete();
  const buckets = classifyStrings(strings, dexPkgs);

  // flat, deduped value list + the category each value belongs to
  const valueCat = new Map();
  for (const cat of IOC_CATS) for (const v of buckets[cat]) if (!valueCat.has(v)) valueCat.set(v, cat);
  const values = [...valueCat.keys()];

  iocTotals = { total: values.length };
  for (const cat of IOC_CATS) iocTotals[cat] = buckets[cat].size;
  if (!values.length) return;

  // batched xref: value -> [classDescriptors]. Cap the number cross-referenced
  // so a string-heavy APK doesn't build a huge Aho-Corasick automaton; extras
  // are still listed (just without class links). Mirrors ioc.py's xref_limit.
  const XREF_CAP = 400;
  const toXref = values.slice(0, XREF_CAP);
  const VS = new Module.VectorString();
  for (const v of toXref) VS.push_back(v);
  let perValueClasses;
  try { perValueClasses = dkInst.xrefStringsToClasses(VS); }
  finally { VS.delete(); }

  iocIndex = [];
  for (let i = 0; i < values.length; i++) {
    const cat = valueCat.get(values[i]);
    const cls = (i < toXref.length && perValueClasses[i]) ? perValueClasses[i] : [];
    iocIndex.push({ value: values[i], cat, classes: [...cls] });
    for (const cd of cls) {
      let e = classIoc.get(cd);
      if (!e) { e = { urls:new Set(), ips:new Set(), domains:new Set(), emails:new Set(), onion:new Set() }; classIoc.set(cd, e); }
      e[cat].add(values[i]);
    }
  }
}
const iocCountFor = cd => {
  const e = classIoc.get(cd); if (!e) return 0;
  let n = 0; for (const cat of IOC_CATS) n += e[cat].size; return n;
};

// ---- dangerous-permission callers (dexllm.dangerous_permission_api_callers) ----
// Port of src/dexllm/dangerous_api.py. Join the AOSP permission→API table against
// the APK's external method refs, then resolve each used gated API to the methods
// that call it.
//
// dexllm 0.1.6+ ships a SIGNATURE-PRECISE dangerous_perm_api.json (entries are
// `pkg.Class#method(params)`), so overloads with different permission gates are
// disambiguated. We mirror dangerous_api.py's matching policy: arity is the
// primary, parse-robust discriminator; exact simple-type matching is only the
// tiebreak when a (class, method) has multiple overloads of the same arity. A
// lone overload (of its arity) matches on name alone, so a signature edge case
// can never drop a real hit.
const descToJava = d => (d.startsWith("L") && d.endsWith(";")) ? d.slice(1, -1).replace(/\//g, ".") : d;
const classOfMethod = md => md.split("->")[0];   // "Lcls;->m()V" -> "Lcls;"

// Caller prefixes treated as bundled framework / official-library code — a
// dangerous-API call from here is library plumbing, not app behaviour. Mirrors
// dangerous_api.py `_FRAMEWORK_CALLER_PREFIXES`.
const FRAMEWORK_CALLER_PREFIXES = [
  "Landroidx/", "Landroid/support/", "Landroid/arch/", "Lkotlin/", "Lkotlinx/",
  "Ljava/", "Ljavax/", "Ldalvik/", "Lcom/google/android/", "Lcom/google/common/",
  "Lcom/google/gson/",
];
const isFrameworkCaller = desc => FRAMEWORK_CALLER_PREFIXES.some(p => desc.startsWith(p));

// ── signature normalisation (mirror of dangerous_api.py) ────────────────────
// Both sides are reduced to a tuple of SIMPLE type names so a Dalvik proto and
// a Java/Kotlin source signature compare equal without resolving the dataset's
// unqualified type names to packages.
const DALVIK_PRIM = {
  I:"int", J:"long", Z:"boolean", D:"double", F:"float",
  B:"byte", S:"short", C:"char", V:"void",
};
const KOTLIN_ALIASES = {
  Int:"int", Long:"long", Short:"short", Byte:"byte", Char:"char",
  Boolean:"boolean", Float:"float", Double:"double", Unit:"void", Any:"Object",
};
const JAVA_MODIFIERS = new Set(["final"]);
// Strip an annotation (`@Foo`, `@Foo(...)`, `@pkg.Outer.Foo (...)`) — its name
// may be dotted/qualified, optional non-nested arg list. Done whole so its
// inner `=`/`,` can't leak into types or be miscounted as a param separator.
const ANNOTATION_RE = /@[\w.]+\s*(\([^()]*\))?/g;

function simpleName(t) {
  return t.replace(/\//g, ".").replace(/\$/g, ".").split(".").pop();
}

// Dalvik proto `(...)ret` -> tuple of simple param type names.
function dalvikParamTypes(proto) {
  const o = proto.indexOf("("), c = proto.indexOf(")");
  if (o < 0 || c < o) return [];
  const inner = proto.slice(o + 1, c);
  const out = [];
  let i = 0;
  while (i < inner.length) {
    let dims = 0;
    while (i < inner.length && inner[i] === "[") { dims++; i++; }
    if (i >= inner.length) break;
    const ch = inner[i];
    if (ch === "L") {
      const j = inner.indexOf(";", i);
      if (j < 0) break;
      out.push(simpleName(inner.slice(i + 1, j)) + "[]".repeat(dims));
      i = j + 1;
    } else {
      out.push((DALVIK_PRIM[ch] || ch) + "[]".repeat(dims));
      i++;
    }
  }
  return out;
}

// Split a parameter list on top-level commas (respecting <>, (), [] nesting).
function splitTopLevel(params) {
  const parts = [];
  let depth = 0, cur = "";
  for (const ch of params) {
    if (ch === "<" || ch === "(" || ch === "[") depth++;
    else if (ch === ">" || ch === ")" || ch === "]") depth = Math.max(0, depth - 1);
    if (ch === "," && depth === 0) { parts.push(cur); cur = ""; }
    else cur += ch;
  }
  if (cur.trim()) parts.push(cur);
  return parts;
}

// One param decl -> simple type. Handles Java `Type name`, Kotlin `name: Type`,
// generics, arrays, varargs. Annotations are already stripped upstream.
function paramSimple(param) {
  let p = param.replace(/<.*>/, "").trim();          // erase generics FIRST
  const dims = (p.match(/\[\]/g) || []).length + (p.indexOf("...") !== -1 ? 1 : 0);
  p = p.replace(/\[\]/g, " ").replace(/\.\.\./g, " ").trim();
  let typeStr;
  if (p.indexOf(":") !== -1) {
    typeStr = p.split(":").pop().trim();              // Kotlin `name: Type`
  } else {
    const toks = p.split(/\s+/).filter(t => t && !JAVA_MODIFIERS.has(t));
    if (!toks.length) return "";
    typeStr = toks.length >= 2 ? toks.slice(0, -1).join(" ") : toks[0];
  }
  typeStr = typeStr.replace(/\?$/, "").trim();        // Kotlin nullable `String?`
  const base = simpleName(typeStr);
  return (KOTLIN_ALIASES[base] || base) + "[]".repeat(dims);
}

// `pkg.Class#method(params)` -> {cls, name, types | null}. Field/constant
// entries (no `(...)`) yield types=null and never match a method-call ref.
function parseApi(entry) {
  const hash = entry.indexOf("#");
  if (hash < 0) return { cls: entry, name: "", types: null };
  let cls = entry.slice(0, hash).replace(/\$/g, ".");
  const rest = entry.slice(hash + 1);
  const o = rest.indexOf("("), c = rest.lastIndexOf(")");
  if (o < 0 || c < o) return { cls, name: rest, types: null };
  const name = rest.slice(0, o);
  const params = rest.slice(o + 1, c).replace(ANNOTATION_RE, " ");
  if (!params.trim()) return { cls, name, types: [] };
  return { cls, name, types: splitTopLevel(params).map(paramSimple) };
}

// {(class, method): {arity: #distinct overloads of that arity}}
// Drives the ambiguity check: a (class, method) with one overload — or one
// overload of a given arity — needs no signature parsing to disambiguate. Dedup
// is by FULL signature STRING, not the reduced simple-type tuple (two overloads
// can reduce to the same tuple, e.g. java.util.Date vs java.sql.Date).
function buildOverloadIndex(dangerMap) {
  const seen = new Map();                  // "cls␀method" -> Set<sig>
  for (const sigs of Object.values(dangerMap)) {
    for (const sig of sigs) {
      const { cls, name, types } = parseApi(sig);
      if (types === null) continue;
      const k = cls + "␀" + name;
      let s = seen.get(k); if (!s) { s = new Set(); seen.set(k, s); }
      s.add(sig);
    }
  }
  const out = new Map();
  for (const [k, sigSet] of seen) {
    const arity = {};
    for (const sig of sigSet) {
      const n = (parseApi(sig).types || []).length;
      arity[n] = (arity[n] || 0) + 1;
    }
    out.set(k, arity);
  }
  return out;
}

// Whether a dex ref realises the dataset signature `types`.
function refMatches(ref, types, arityMap) {
  let total = 0;
  for (const v of Object.values(arityMap)) total += v;
  if (total <= 1) return true;             // single overload — name match unambiguous
  const refTypes = dalvikParamTypes(ref.proto);
  if (refTypes.length !== types.length) return false;
  if ((arityMap[types.length] || 0) <= 1) return true;   // unique arity in the set
  return refTypes.join(",") === types.join(",");
}

// Index APK external method refs by (java_class, method_name). Aliases each
// `<init>` ref under the class simple name so a dataset constructor entry
// `Class#SimpleName(...)` matches without rewriting the dataset side.
function buildExternalIndex(dkInst) {
  const idx = new Map();
  const refs = dkInst.listExternalMethodRefs();
  const add = (cls, name, ref) => {
    const k = cls + "␀" + name;
    let bucket = idx.get(k);
    if (!bucket) { bucket = []; idx.set(k, bucket); }
    bucket.push(ref);
  };
  for (const r of refs) {
    const cls = descToJava(r.cls).replace(/\$/g, ".");   // canonicalise inner-class sep
    add(cls, r.name, r);
    if (r.name === "<init>") add(cls, cls.split(".").pop(), r);
  }
  return idx;
}

function computePerms(dkInst, appOnly = true) {
  permIndex = []; permTotals = null;
  if (!dangerMap) return;
  const idx = buildExternalIndex(dkInst);
  const overloads = buildOverloadIndex(dangerMap);
  const perms = new Set(), callersAll = new Set();
  for (const perm of Object.keys(dangerMap)) {
    for (const sig of dangerMap[perm]) {
      const { cls, name, types } = parseApi(sig);
      if (types === null) continue;                  // field/constant entry
      const refs = idx.get(cls + "␀" + name);
      if (!refs) continue;
      const arityMap = overloads.get(cls + "␀" + name) || {};
      const matched = refs.filter(r => refMatches(r, types, arityMap));
      if (!matched.length) continue;
      const callers = new Set();
      for (const r of matched) {
        const desc = r.cls + "->" + r.name + r.proto;
        const cs = dkInst.findCallSitesToApi(desc);
        for (let i = 0; i < cs.size(); i++) {
          const caller = cs.get(i);
          if (appOnly && isFrameworkCaller(caller)) continue;
          callers.add(caller);
        }
        cs.delete();
      }
      if (callers.size) {
        permIndex.push({ perm, api: sig, callers: [...callers] });
        perms.add(perm); callers.forEach(c => callersAll.add(c));
      }
    }
  }
  permTotals = { perms: perms.size, apis: permIndex.length, callers: callersAll.size };
}

createDexllm({ locateFile: (f) => f + "?v=" + window.__DEXLLM_BUILD }).then(m => {
  Module = m;
  statusEl.innerHTML = "engine ready · <b>drop a file</b>";
}).catch(e => { statusEl.innerHTML = '<span class="pill bad">engine load failed</span>'; console.error(e); });

// Single source of truth for turning ANY thrown thing into a readable string.
// Mirrors the worker's describeError — emscripten 6.x's getExceptionMessage
// can itself throw "memory access out of bounds" if the C++ exception was
// already freed by the time we read it, so guarding the inner call is
// mandatory. The previous inline `Module.getExceptionMessage(err.excPtr)`
// calls (in loadFile / addDumpedDex / older selectClass) sometimes leaked the
// raw CppException JSON `{"excPtr": N}` to the UI when they crashed.
function describeError(err) {
  if (err == null) return "unknown error";
  if (typeof err === "string") return err;
  const ptr = (err && typeof err.excPtr === "number") ? err.excPtr : null;
  if (ptr != null && Module && typeof Module.getExceptionMessage === "function") {
    try {
      const r = Module.getExceptionMessage(ptr);
      if (Array.isArray(r)) {
        const msg = r.filter(Boolean).map(String).join(": ");
        if (msg) return msg;
      }
      if (typeof r === "string" && r) return r;
    } catch (_) { /* exception already freed — fall through to ptr label */ }
  }
  if (ptr != null) return "wasm exception (excPtr=" + ptr + ")";
  if (err.message) return String(err.message);
  if (err.name) return String(err.name);
  try { const s = JSON.stringify(err); if (s && s !== "{}") return s; } catch (_) {}
  return Object.prototype.toString.call(err);
}

// ── decompile worker ───────────────────────────────────────────────────────
// Decompile in wasm is synchronous on the calling thread — a heavy class can
// block the main thread for many seconds, freezing scrolling, tab switches,
// even the status spinner. Hand that work to a worker so the UI stays
// responsive. The worker maintains its OWN parallel set of WasmDexKits keyed
// by the same source order as the main thread, so cross-source overlap routing
// still works.
const worker = new Worker("worker.js?v=" + window.__DEXLLM_BUILD);
const _pending = new Map(); let _wid = 1;
worker.onmessage = e => {
  const p = _pending.get(e.data.id); if (!p) return;
  _pending.delete(e.data.id);
  if (e.data.ok) p.resolve(e.data.result); else p.reject(new Error(e.data.error));
};
worker.onerror = e => console.error("worker error:", e.message);
function wcall(msg, transfer) {
  const id = _wid++;
  return new Promise((res, rej) => {
    _pending.set(id, { resolve: res, reject: rej });
    worker.postMessage({ ...msg, id }, transfer || []);
  });
}
// Hand the worker the build SHA so its locateFile picks the same cache-busted
// wasm path (otherwise it would re-download dexllm.wasm with no query string).
wcall({ type: "init", buildSha: window.__DEXLLM_BUILD }).catch(e => console.error("worker init failed", e));

// ---- file intake ----
const drop = $("#drop");
$("#file").addEventListener("change", e => { if (e.target.files[0]) loadFile(e.target.files[0]); });
["dragenter","dragover"].forEach(ev => drop.addEventListener(ev, e => { e.preventDefault(); drop.classList.add("drag"); }));
["dragleave","drop"].forEach(ev => drop.addEventListener(ev, e => { e.preventDefault(); drop.classList.remove("drag"); }));
drop.addEventListener("drop", e => { const f = e.dataTransfer.files[0]; if (f) loadFile(f); });

// Mode toggle — Runtime ↔ Isolated. Setup is one-shot; setMode handles the
// guard against redundant transitions itself.
for (const btn of document.querySelectorAll("#modetoggle .mt")) {
  btn.addEventListener("click", () => setMode(btn.dataset.mode));
}

// "+ dex" button — runtime-dumped image (a .dex or a zip/apk holding decrypted
// dexes) is loaded WITH PRIORITY over the original (first-wins → unpacked
// classes win collisions, mirroring ART after a packer unpacks).
// "+ dex" routes by mode:
//   Runtime    → addDumpedDex (multi-source rebuild with prefer=true; mirrors
//                dexllm.add_dumped_dexes)
//   Isolated → addIsolatedDex (each contained classes*.dex becomes its
//                own isolated tab; no priority effect, no aggregate change)
$("#adddex").addEventListener("click", () => $("#adddexfile").click());
$("#adddexfile").addEventListener("change", async e => {
  const files = [...(e.target.files || [])];
  e.target.value = "";   // reset so picking the same file again re-fires change
  if (!files.length) return;
  const btn = $("#adddex");
  btn.disabled = true; const orig = btn.textContent; btn.textContent = "+ dex …";
  try {
    for (const f of files) {
      if (viewMode === "isolated") await addIsolatedDex(f);
      else await addDumpedDex(f);
    }
  } finally { btn.disabled = false; btn.textContent = orig; }
});
// Drag-drop a .dex/.zip directly onto the sidebar dex bar adds it as a dump.
const dexbarEl = $("#dexbar");
["dragenter","dragover"].forEach(ev => dexbarEl.addEventListener(ev, e => { e.preventDefault(); dexbarEl.style.outline = "1px dashed var(--accent)"; }));
["dragleave","drop"].forEach(ev => dexbarEl.addEventListener(ev, e => { e.preventDefault(); dexbarEl.style.outline = ""; }));
dexbarEl.addEventListener("drop", async e => {
  if (!originalSource) return;             // ignore drops before the apk is loaded
  const btn = $("#adddex"); btn.disabled = true; const orig = btn.textContent; btn.textContent = "+ dex …";
  try {
    for (const f of e.dataTransfer.files) {
      if (viewMode === "isolated") await addIsolatedDex(f);
      else await addDumpedDex(f);
    }
  } finally { btn.disabled = false; btn.textContent = orig; }
});

// Outro/transition clip: on drop, swap the looping clip for trans.mp4 (same
// spot) and play it once. Resolves when it ends (or a safety cap), which is
// when we reveal the class browser.
// Playback speeds: loop clip 1.8×, transition clip 2×.
const VID_RATE = 1.8;
const TRANS_RATE = 2.0;
(function () {
  const lv = $("#loopvid");
  if (!lv) return;
  const apply = () => { try { lv.playbackRate = VID_RATE; } catch (_) {} };
  apply(); lv.addEventListener("loadedmetadata", apply); lv.addEventListener("play", apply);
  // Recent Chrome ships stricter autoplay (document-user-activation-required)
  // where even `autoplay muted` is held until a user gesture. Force the play()
  // call ourselves (muted videos still resolve), and as a last-resort fallback
  // retry on the first user interaction. iOS/Safari also benefit from the kick.
  lv.muted = true;                        // make defaultMuted explicit pre-play
  const kick = () => { const p = lv.play(); if (p && p.catch) p.catch(() => {}); };
  kick(); lv.addEventListener("loadedmetadata", kick); lv.addEventListener("canplay", kick);
  const retry = () => { if (lv.paused) kick(); };
  ["pointerdown","touchstart","keydown","scroll","visibilitychange"].forEach(
    ev => document.addEventListener(ev, retry, { once: false, passive: true }));
})();

let transTimer = null;
function startTransition() {
  const loop = $("#loopvid"), trans = $("#transvid");
  if (loop) loop.style.display = "none";
  trans.style.display = "block";
  try { trans.currentTime = 0; trans.playbackRate = TRANS_RATE; } catch (_) {}
  const p = trans.play(); if (p && p.catch) p.catch(() => {});
  try { trans.playbackRate = TRANS_RATE; } catch (_) {}
  return new Promise(resolve => {
    let done = false;
    const finish = () => { if (done) return; done = true; clearTimeout(transTimer); resolve(); };
    trans.onended = finish;
    trans.onerror = finish;
    transTimer = setTimeout(finish, 6500);   // never hang the UI
  });
}
function stopTransition() {                    // restore the loop (e.g. on load error)
  const loop = $("#loopvid"), trans = $("#transvid");
  clearTimeout(transTimer);
  try { trans.pause(); } catch (_) {}
  trans.style.display = "none";
  if (loop) loop.style.display = "";
}

async function loadFile(file) {
  if (!Module) { alert("engine still loading…"); return; }
  const transition = startTransition();   // play the outro clip while we parse
  statusEl.innerHTML = `parsing <b>${file.name}</b>…`;
  const buf = new Uint8Array(await file.arrayBuffer());
  // Fresh load wipes any previously-added dumps; rewriting /input.bin so the
  // path stays stable lets the rebuild flow (multi-source ctor) reuse it.
  for (const v of vfsBytes) { try { Module.FS.unlink(v); } catch (_) {} }
  vfsBytes.clear();
  disposeIsolated();
  runtimePanelSnap = null;
  dumpedSources = [];
  try { Module.FS.writeFile("/input.bin", buf); } catch (_) {
    try { Module.FS.unlink("/input.bin"); } catch (_) {} Module.FS.writeFile("/input.bin", buf);
  }
  vfsBytes.add("/input.bin");
  selectedDex = "all";
  if (dk) { try { dk.delete(); } catch (_) {} dk = null; }

  let t0 = performance.now();
  try {
    dk = new Module.WasmDexKit("/input.bin");
  } catch (err) {
    statusEl.innerHTML = `<span class="pill bad">load failed</span> ${describeError(err)}`;
    stopTransition();   // bad file — keep the user on the drop screen
    return;
  }
  const loadMs = (performance.now() - t0).toFixed(0);
  // slotCount = attempted dexes (length of verifyReport), NOT dexCount() (which
  // excludes rejected ones).
  originalSource = {
    vfs: "/input.bin",
    label: file.name,
    slotCount: dk.verifyReport().length,
    baseDexId: 0,
  };

  // Mirror to the decompile worker. We hand it a fresh copy so transferring
  // (zero-copy postMessage) doesn't detach the main thread's view.
  const workerBuf = new Uint8Array(buf);
  wcall({ type: "load", bytes: workerBuf, label: file.name }, [workerBuf.buffer]).catch(e => {
    console.error("worker load failed:", e); statusEl.innerHTML += " <span class='pill bad'>worker offline</span>";
  });

  await processCurrentDk(file.name, loadMs, { firstLoad: true, transition });
}

// Build a fresh multi-source DexKit over [dumps..., original]. dumps go FIRST
// so first-wins resolution makes their classes win a collision (mirrors ART
// after a packer unpack — `add_dumped_dexes(prefer=True)` in dexllm proper).
// lenient=true so a partially-decrypted dump still loads under ART-structural-
// equivalent verification. The worker mirrors this on its own thread.
function rebuildDk() {
  if (dk) { try { dk.delete(); } catch (_) {} dk = null; }
  if (!dumpedSources.length) {
    dk = new Module.WasmDexKit(originalSource.vfs);
    return;
  }
  const VS = new Module.VectorString();
  for (const d of dumpedSources) VS.push_back(d.vfs);
  VS.push_back(originalSource.vfs);
  try { dk = new Module.WasmDexKit(VS, /*lenient=*/true); }
  finally { VS.delete(); }
}

// (Re)compute each source's `baseDexId` (where its dexes start in the multi-
// source layout). Sources are walked in priority order: dumps first, then
// original. Each source contributes its `slotCount` consecutive dex_ids.
function computeBaseDexIds() {
  let cursor = 0;
  for (const s of dumpedSources) { s.baseDexId = cursor; cursor += s.slotCount; }
  originalSource.baseDexId = cursor;
}

// Add a runtime-dumped .dex (or .apk holding dexes) on top of the current load.
// The packer-unpack workflow: the dumped image is loaded with priority over
// the original, so the unpacked class wins a collision (mirrors ART). Updates
// `dumpedSources`, rebuilds dk, then re-runs IOC + perms via processCurrentDk.
async function addDumpedDex(file) {
  if (!Module || !originalSource) { alert("load an APK first"); return; }
  const buf = new Uint8Array(await file.arrayBuffer());
  // Stable VFS path so the rebuild can locate it. Numeric suffix tracks
  // insertion order — UI labels reflect that (dump-1, dump-2, …). Extension is
  // arbitrary (content-based magic detection), but '.bin' keeps the path
  // honest for both bare-.dex and apk dumps.
  const idx = dumpedSources.length + 1;
  const vfs = `/dump-${idx}.bin`;
  try { Module.FS.writeFile(vfs, buf); } catch (_) {
    try { Module.FS.unlink(vfs); } catch (_) {} Module.FS.writeFile(vfs, buf);
  }
  vfsBytes.add(vfs);

  // Probe the dump as a isolated DexKit just to capture its slot count
  // (attempted dexes), then dispose — the worker will keep its own isolated
  // for per-dex decompile routing. lenient is implicit; partial decrypts will
  // be lenient-loaded on the multi-source rebuild below.
  const t0 = performance.now();
  let slotCount;
  try {
    const probe = new Module.WasmDexKit(vfs);
    slotCount = probe.verifyReport().length;
    probe.delete();
  } catch (err) {
    statusEl.innerHTML = `<span class="pill bad">dump load failed</span> ${describeError(err)}`;
    try { Module.FS.unlink(vfs); } catch (_) {}
    vfsBytes.delete(vfs);
    return;
  }
  dumpedSources.push({ vfs, label: file.name, slotCount, baseDexId: 0 });

  // Mirror dump to the worker so its routing stays in sync with sources[].
  const workerBuf = new Uint8Array(buf);
  wcall({ type: "addDump", bytes: workerBuf, label: file.name, vfs },
        [workerBuf.buffer]).catch(e => console.error("worker addDump failed:", e));

  try {
    rebuildDk();
  } catch (err) {
    statusEl.innerHTML = `<span class="pill bad">dump load failed</span> ${describeError(err)}`;
    dumpedSources.pop();
    try { Module.FS.unlink(vfs); } catch (_) {}
    vfsBytes.delete(vfs);
    rebuildDk();
    return;
  }
  const loadMs = (performance.now() - t0).toFixed(0);
  // Aggregate dk just got rebuilt with the new dump → the regular per-dex
  // Isolated entries we may have built (keyed by global dex_id) are now
  // stale (dex_ids shifted). Drop ONLY the regular entries; the user's
  // Isolated-only "+ dex" additions ("x1"/"x2"/...) survive — a Runtime
  // change is one-way and must not erase what was added in Isolated.
  disposeIsolated({ keepExtras: true });
  await processCurrentDk(originalSource.label, loadMs, { firstLoad: false });
  if (viewMode === "isolated") {
    ensureIsolated();
    // selectedDex may have shifted (dump dex_ids inserted ahead of the
    // original's): if the previously-selected tab is no longer valid, jump to
    // the first valid one.
    if (!isolated.has(Number(selectedDex))) {
      const first = dexInfo.find(d => d.valid && isolated.has(d.dex_id));
      selectedDex = first ? first.dex_id : selectedDex;
    }
    activateIsolatedTab(selectedDex);
    renderPanels();
    statusEl.innerHTML = isolatedStatusHead(Number(selectedDex));
  }
}

// Isolated "+ dex": add a .dex or zip/apk as one or more INDEPENDENT
// isolated tabs. No multi-source rebuild, no priority resolution, no effect on
// the runtime aggregate. Each classes*.dex inside the file gets its own
// isolated WasmDexKit + its own tab + its own IoC/perm panels.
async function addIsolatedDex(file) {
  if (!Module || !originalSource) { alert("load an APK first"); return; }
  const buf = new Uint8Array(await file.arrayBuffer());
  const baseLabel = file.name;

  // Throwaway probe DexKit — only used to discover the dexes inside and
  // extract each one's raw bytes. Disposed before this function returns.
  const probeVfs = "/probe-extra.bin";
  try { Module.FS.writeFile(probeVfs, buf); } catch (_) {
    try { Module.FS.unlink(probeVfs); } catch (_) {} Module.FS.writeFile(probeVfs, buf);
  }
  let probeDk, rep;
  try {
    probeDk = new Module.WasmDexKit(probeVfs);
    rep = probeDk.verifyReport();
  } catch (err) {
    statusEl.innerHTML = `<span class="pill bad">add failed</span> ${describeError(err)}`;
    try { Module.FS.unlink(probeVfs); } catch (_) {}
    return;
  }

  const addedKeys = [];
  for (const r of rep) {
    if (!r.valid) continue;
    let view;
    try { view = probeDk.extractDexBytes(r.dex_id); }
    catch (err) { console.warn("extractDexBytes failed for extra dex", err); continue; }
    if (!view) continue;
    const bytes = new Uint8Array(view);
    const key = "x" + (nextExtraKey++);
    const vfs = `/extra-${key}.dex`;
    try { Module.FS.writeFile(vfs, bytes); } catch (_) {
      try { Module.FS.unlink(vfs); } catch (_) {} Module.FS.writeFile(vfs, bytes);
    }
    let isoDk;
    try { isoDk = new Module.WasmDexKit(vfs); }
    catch (err) { console.warn("isolated isolated load failed", err); continue; }
    // Pre-populate the class list so navigateToClass cross-tab lookups can
    // find an extra without forcing a per-tab activate first.
    const cv = isoDk.listClasses();
    const classes = []; for (let i = 0; i < cv.size(); i++) classes.push(cv.get(i));
    cv.delete(); classes.sort();
    isolated.set(key, { dk: isoDk, classes, ioc: null, perm: null, permLoaded: false });

    // Mirror to worker for decompile
    const wbytes = new Uint8Array(bytes);
    wcall({ type: "addIsolated", bytes: wbytes, vfs, key }, [wbytes.buffer])
      .catch(e => console.error("worker addIsolated failed:", e));

    // dexInfo entry so renderDexBar shows the tab. dump=true gives the
    // dashed-red border so user-added tabs are visually distinct from
    // APK-internal dexes. isolatedOnly so runtime mode never includes it.
    const label = rep.length > 1 ? `${baseLabel} · ${r.name}` : baseLabel;
    dexInfo.push({
      dex_id: key,
      name: r.name,
      valid: true,
      reason: "",
      sourceLabel: label,
      dump: true,
      count: classes.length,
      sourceIdx: -1,
      localDexId: r.dex_id,
      isolatedOnly: true,
    });
    addedKeys.push(key);
  }

  try { probeDk.delete(); } catch (_) {}
  try { Module.FS.unlink(probeVfs); } catch (_) {}

  if (!addedKeys.length) {
    statusEl.innerHTML = `<span class="pill bad">add failed</span> no valid dex in ${file.name}`;
    return;
  }

  selectedDex = addedKeys[0];
  currentClass = null; codeLineCache = [];
  activateIsolatedTab(selectedDex);
  renderDexBar();
  renderList($("#search").value || "");
  renderPanels();
  statusEl.innerHTML = isolatedStatusHead(selectedDex);
}

// Post-load pipeline shared between initial APK load and add-dumped-dex.
// Recomputes verifier verdict + class list + per-dex placement + IOC + perms,
// then re-renders the class browser and tabs. On first load, also waits for
// the outro clip and reveals the main UI.
async function processCurrentDk(label, loadMs, opts) {
  // verifier verdict — drives the dexInfo table consumed by the per-dex tabs.
  const rep = dk.verifyReport();
  let nbad = 0; const n = rep.length;
  for (let i = 0; i < n; i++) if (!rep[i].valid) nbad++;
  const vpill = nbad === 0
    ? `<span class="pill ok">verified ✓</span>`
    : `<span class="pill bad">${nbad}/${n} dex rejected</span>`;

  // Per-dex class listing — listClassesInDex returns ALL classes declared in
  // each specific dex, NOT first-wins-deduped. So a class declared in both a
  // dump and the original APK appears in BOTH dex tabs. This is the whole point
  // of the per-dex view ("각 dex마다 있어도 개별 덱스에서는 볼 수 있어야 한다").
  dexClasses = new Map();
  const perDexCount = new Map();
  for (let did = 0; did < dk.dexCount(); did++) {
    const v = dk.listClassesInDex(did);
    const arr = []; for (let i = 0; i < v.size(); i++) arr.push(v.get(i));
    v.delete();
    arr.sort();
    dexClasses.set(did, arr);
    perDexCount.set(did, arr.length);
  }
  // Aggregated `allClasses` is the deduped union (sorted) — what the "all" tab
  // shows. Each class appears once even if multiple dexes declare it; the
  // global decompile (first-wins) handles the resolution.
  {
    const seen = new Set();
    for (const arr of dexClasses.values()) for (const c of arr) seen.add(c);
    allClasses = [...seen].sort();
  }

  // Establish baseDexId per source + global dex_id → source mapping before
  // buildDexInfo / decompile routing rely on it.
  computeBaseDexIds();
  // Rebuild the regular-dex entries from the current aggregate dk, but
  // preserve any Isolated-only "+ dex" additions the user made — those are
  // the user's own tabs in Isolated mode and don't depend on the runtime
  // aggregate. disposeIsolated({keepExtras:true}) on the caller side keeps
  // the matching iso DexKits alive in parallel.
  const preservedExtras = dexInfo.filter(d => d.isolatedOnly);
  dexInfo = buildDexInfo(rep, perDexCount).concat(preservedExtras);

  // network-IOC pass over the full corpus (dumps + apk) — first-wins applied.
  statusEl.innerHTML = `<b>${label}</b> · scanning for network indicators…`;
  classIoc = new Map(); iocTotals = null;
  try {
    const descriptors = allClasses.slice();
    const tv = dk.listExternalTypeRefs();
    for (let i = 0; i < tv.size(); i++) descriptors.push(tv.get(i));
    tv.delete();
    await new Promise(r => setTimeout(r, 0));   // let the "scanning…" status paint
    computeIocs(dk, descriptors);
  } catch (e) { console.error("IOC extraction failed:", e); iocTotals = null; }

  permIndex = []; permTotals = null; permPending = true;

  const dumpPill = dumpedSources.length
    ? ` · <span class="pill bad" title="runtime-dumped dexes loaded with priority over the original APK">📦 ${dumpedSources.length} dump${dumpedSources.length === 1 ? "" : "s"}</span>`
    : "";
  const statusHead = `<b>${label}</b> · ${dk.dexCount()} dex · ${allClasses.length} classes · ${loadMs}ms ${vpill}${dumpPill}`;
  runtimeStatusHead = statusHead + statusPills();
  statusEl.innerHTML = runtimeStatusHead;

  if (opts && opts.firstLoad) {
    await opts.transition;
    $("#main").classList.add("show");
    $("#modetoggle").classList.add("show");
    drop.style.display = "none";
    selectedEl = null; currentClass = null; codeLineCache = [];
    $("#vname").textContent = "— select a class —"; $("#vmeta").textContent = "";
    $("#iocbar").classList.add("empty"); $("#iocbar").innerHTML = "";
    $("#code").innerHTML = '<div class="placeholder">Pick a class on the left to decompile it.' +
      (iocTotals && iocTotals.total ? ' Classes that reference a network indicator are marked <span class="ioc-badge">⚑</span>, or click any indicator on the right to jump to it.' : "") + '</div>';
    $("#iocfilter").value = ""; $("#permfilter").value = "";
    $("#search").value = "";
  }
  renderModeToggle();
  renderDexBar();
  renderPanels();
  renderList($("#search").value || "");
  if (opts && opts.firstLoad) $("#search").focus();
  setTimeout(() => analyzePerms(statusHead), 30);
}

// Map verifyReport + per-dex class counts into the per-dex tab model.
// Multi-source verifyReport is one entry PER ATTEMPTED DEX in source-priority
// order — dumps first, original last (the rebuild contract). We walk it in
// lockstep with each source's recorded `slotCount` to attribute each entry to
// its source. A multidex source's entries get a "label · classes*.dex" label so
// users see both the file they dropped and the in-zip name; a single-dex source
// shows just the file name.
function buildDexInfo(rep, perDexCount) {
  const sources = [...dumpedSources, originalSource];
  const out = [];
  let cursor = 0;
  for (let si = 0; si < sources.length; si++) {
    const s = sources[si];
    const isDump = si < dumpedSources.length;
    const n = s.slotCount || 0;
    for (let k = 0; k < n && cursor < rep.length; k++) {
      const r = rep[cursor++];
      const sourceLabel = n > 1 ? `${s.label} · ${r.name}` : s.label;
      out.push({
        dex_id: r.dex_id,
        name: r.name,
        valid: r.valid,
        reason: r.reason,
        sourceLabel,
        dump: isDump,
        count: r.valid ? (perDexCount.get(r.dex_id) || 0) : 0,
        sourceIdx: si,
        localDexId: k,
      });
    }
  }
  return out;
}

// Sync the mode toggle's pill state to viewMode. Show the toggle only after
// the first APK loads (controlled separately by processCurrentDk's path). Also
// updates the "+ dex" button tooltip so the user can tell which kind of
// addition they're about to perform.
function renderModeToggle() {
  for (const b of document.querySelectorAll("#modetoggle .mt")) {
    b.classList.toggle("sel", b.dataset.mode === viewMode);
  }
  const adddex = $("#adddex");
  if (adddex) {
    adddex.title = viewMode === "isolated"
      ? "Add a .dex / .apk — each contained dex becomes its own isolated tab (no priority, inspected independently)"
      : "Add a runtime-dumped .dex / .apk on top (prefer=true → its classes win collisions, mirrors dexllm.add_dumped_dexes)";
  }
}

// Tear down isolated DexKits + their vfs files, on both main and worker.
// Two modes:
//   default        — full wipe (loadFile reset, new APK).
//   {keepExtras:true} — preserve Isolated-only "+ dex" additions (string-keyed
//                      "x1"/"x2"/...) while dropping the regular APK-dex
//                      entries. Used by addDumpedDex: a Runtime change must
//                      not erase what the user added separately in Isolated.
function disposeIsolated({ keepExtras = false } = {}) {
  for (const [did, iso] of [...isolated]) {
    const isExtra = typeof did === "string";
    if (keepExtras && isExtra) continue;
    try { iso.dk.delete(); } catch (_) {}
    if (isExtra) { try { Module.FS.unlink(`/extra-${did}.dex`); } catch (_) {} }
    else         { try { Module.FS.unlink(`/iso-${did}.dex`);   } catch (_) {} }
    isolated.delete(did);
  }
  if (!keepExtras) {
    dexInfo = dexInfo.filter(d => !d.isolatedOnly);
    nextExtraKey = 1;
  }
  if (Module) wcall({ type: "resetIsolated", keepExtras }).catch(e => console.error("worker resetIso:", e));
}

// Build isolated DexKits for every valid dex in dexInfo. Sync on the main
// thread (extractDexBytes + WasmDexKit ctor are both synchronous). The worker
// mirror is fired off concurrently and the worker's message queue serializes
// the addIsolated against the eventual decompile request — by the time the
// user clicks a class, the worker has its iso DexKit ready.
function ensureIsolated() {
  if (!dk) return;
  for (const d of dexInfo) {
    if (!d.valid) continue;
    // Isolated-only extras (the user's "+ dex" additions made in Isolated
    // mode) carry their own bytes — addIsolatedDex already populated the
    // isolated map and worker. They are NOT extracted from the runtime
    // aggregate, so skip them here. Their dex_id is a string ("x1") which
    // `dk.extractDexBytes(int)` couldn't accept anyway.
    if (d.isolatedOnly) continue;
    if (isolated.has(d.dex_id)) continue;
    let view;
    try { view = dk.extractDexBytes(d.dex_id); }
    catch (err) { console.warn("extractDexBytes failed for dex_id", d.dex_id, describeError(err)); continue; }
    if (!view) continue;
    const bytes = new Uint8Array(view);             // copy out before next wasm alloc
    const vfs = `/iso-${d.dex_id}.dex`;
    try { Module.FS.writeFile(vfs, bytes); } catch (_) {
      try { Module.FS.unlink(vfs); } catch (_) {} Module.FS.writeFile(vfs, bytes);
    }
    let isoDk;
    try { isoDk = new Module.WasmDexKit(vfs); }
    catch (err) { console.warn("isolated load failed for dex_id", d.dex_id, describeError(err)); continue; }
    isolated.set(d.dex_id, { dk: isoDk, classes: null, ioc: null, perm: null, permLoaded: false });
    // Mirror to worker (fire-and-forget; the worker's serial queue guarantees
    // ordering vs the later decompile message).
    const wbytes = new Uint8Array(bytes);
    wcall({ type: "addIsolated", bytes: wbytes, vfs, key: d.dex_id }, [wbytes.buffer])
      .catch(e => console.error("worker addIsolated failed:", e));
  }
}

// Isolated tab activation. Lazy-computes the per-tab IoC pass (~30ms for a
// typical APK dex) and defers the heavier dangerous-perm pass to a setTimeout
// so the UI paints first. Cached results live on the iso entry, so subsequent
// switches to the same tab are instant.
function activateIsolatedTab(did) {
  // did can be a number (regular dex_id) OR a string like "x1" (isolated-
  // only extra added via "+ dex"). Map.get handles both transparently.
  const key = did;
  const iso = isolated.get(key);
  if (!iso) return;

  // Lazy class list — same set as dexClasses.get(did), but read from the iso
  // dk for symmetry.
  if (iso.classes === null) {
    const v = iso.dk.listClasses();
    const arr = []; for (let i = 0; i < v.size(); i++) arr.push(v.get(i));
    v.delete(); arr.sort();
    iso.classes = arr;
  }

  // Lazy IoC — runs computeIocs against THIS dex only, snapshots the panel
  // globals, restores them. computeIocs writes to module-level vars
  // (classIoc/iocIndex/iocTotals), so we capture the result by save/restore.
  if (iso.ioc === null) {
    const descriptors = iso.classes.slice();
    const tv = iso.dk.listExternalTypeRefs();
    for (let i = 0; i < tv.size(); i++) descriptors.push(tv.get(i));
    tv.delete();
    computeIocs(iso.dk, descriptors);
    iso.ioc = { classIoc, iocIndex, iocTotals };
  }
  classIoc = iso.ioc.classIoc;
  iocIndex = iso.ioc.iocIndex;
  iocTotals = iso.ioc.iocTotals;

  // Lazy perm — deferred so the UI paints before the L2 work starts. The
  // current-tab guard (closure over `key`) bails if the user switched away
  // mid-flight, so we don't clobber the panel with a stale result. Uses
  // `===` directly since key can be either number or string and both forms
  // are stable for the closure's lifetime.
  if (iso.perm) {
    permIndex = iso.perm.permIndex;
    permTotals = iso.perm.permTotals;
    permPending = false;
  } else {
    permIndex = []; permTotals = null; permPending = true;
    renderPermPanel();
    setTimeout(async () => {
      if (viewMode !== "isolated" || selectedDex !== key) return;
      if (!dangerMap) {
        try { dangerMap = await fetch("dangerous_perm_api.json").then(r => r.ok ? r.json() : {}); }
        catch (_) { dangerMap = {}; }
      }
      if (viewMode !== "isolated" || selectedDex !== key) return;
      computePerms(iso.dk, true);
      iso.perm = { permIndex, permTotals };
      iso.permLoaded = true;
      permPending = false;
      renderPermPanel();
      statusEl.innerHTML = isolatedStatusHead(key);
    }, 30);
  }
}

// Status line text for a isolated tab — replaces the global IoC/perm pills
// with this tab's own counts.
function isolatedStatusHead(did) {
  const di = dexInfo.find(d => d.dex_id === did || d.dex_id === Number(did));
  const lbl = di ? di.sourceLabel : `dex ${did}`;
  const iso = isolated.get(did);
  const cls = iso && iso.classes ? iso.classes.length : 0;
  const iocPill = (iocTotals && iocTotals.total)
    ? ` · <span class="pill bad" title="indicators in this dex only">⚑ ${iocTotals.total} IOC${iocTotals.total === 1 ? "" : "s"}</span>`
    : (iocTotals ? ` · <span class="pill ok">no IOCs</span>` : "");
  const permPill = permPending
    ? ` · <span class="pill" style="background:#8b949e22;color:var(--muted)">🔓 analyzing…</span>`
    : (permTotals && permTotals.perms
        ? ` · <span class="pill bad" title="perms exercised in this dex only">🔓 ${permTotals.perms} perm${permTotals.perms === 1 ? "" : "s"}</span>`
        : "");
  return `<b>${lbl}</b> · isolated · ${cls} classes${iocPill}${permPill}`;
}

// Save / restore the runtime-aggregate panel state across mode switches so
// the heavy initial compute isn't redone every toggle.
function snapshotPanels() {
  return { classIoc, iocIndex, iocTotals, permIndex, permTotals, permPending };
}
function restorePanels(s) {
  classIoc = s.classIoc; iocIndex = s.iocIndex; iocTotals = s.iocTotals;
  permIndex = s.permIndex; permTotals = s.permTotals; permPending = s.permPending;
}

// Switch between runtime and isolated modes. The heavy lifting:
//   - When LEAVING runtime, snapshot the aggregate panel state so switching
//     back restores it without redoing the compute.
//   - When ENTERING isolated, ensureIsolated extracts each dex's bytes and
//     creates an isolated WasmDexKit (both on main thread for IoC/perm and
//     in the worker for decompile). activateIsolatedTab then swaps the
//     panels to the selected tab's per-dex view.
//   - When ENTERING runtime, restore the snapshot.
function setMode(newMode) {
  if (newMode !== "runtime" && newMode !== "isolated") return;
  if (viewMode === newMode) return;
  if (viewMode === "runtime") runtimePanelSnap = snapshotPanels();
  viewMode = newMode;
  if (viewMode === "isolated") {
    if (selectedDex === "all") {
      const first = dexInfo.find(d => d.valid);
      selectedDex = first ? first.dex_id : "all";
    }
    ensureIsolated();
    activateIsolatedTab(selectedDex);
  } else {
    // Runtime has only the [all] tab. Force-snap selection back to it so a
    // user that was on dex_1 in isolated doesn't end up on a now-invisible
    // tab key after the switch.
    selectedDex = "all";
    if (runtimePanelSnap) restorePanels(runtimePanelSnap);
    statusEl.innerHTML = runtimeStatusHead || statusEl.innerHTML;
  }
  currentClass = null; codeLineCache = [];
  renderModeToggle();
  renderDexBar();
  renderList($("#search").value || "");
  renderPanels();
  if (viewMode === "isolated") statusEl.innerHTML = isolatedStatusHead(Number(selectedDex));
}

// Tracked at processCurrentDk end so we can restore the runtime status pills
// when switching back from isolated.
let runtimeStatusHead = "";

// Render the per-dex tab bar. In runtime mode the leading [all] tab aggregates
// every loaded dex via first-wins; in isolated mode each dex is its own tab
// with no aggregate. Hidden until the first APK loads.
function renderDexBar() {
  const bar = $("#dexbar");
  if (!dexInfo.length) { bar.classList.remove("show"); return; }
  bar.classList.add("show");
  // tear down old tab buttons, keep the "+ dex" control at the end
  for (const el of [...bar.querySelectorAll(".dextab")]) el.remove();
  const addBtn = $("#adddex");

  const makeTab = (label, key, opts) => {
    const b = document.createElement("button");
    b.type = "button";
    b.className = "dextab" + (key === selectedDex ? " sel" : "") + (opts && opts.dump ? " dump" : "") + (opts && opts.bad ? " bad" : "");
    b.dataset.key = String(key);
    b.innerHTML = label + (opts && opts.count != null ? ` <span class="n">${opts.count}</span>` : "");
    if (opts && opts.title) b.title = opts.title;
    b.addEventListener("click", () => {
      if (selectedDex === key) return;
      selectedDex = key;
      currentClass = null; codeLineCache = [];
      renderDexBar();
      renderList($("#search").value || "");
      // In isolated, swap the IoC/perm panels to this tab's per-dex view.
      // Skip "x-<N>" keys that mark rejected dexes (no isolated entry, would
      // throw); accept both numeric keys (regular dexes) and "x<N>" strings
      // (isolated-only extras added via "+ dex").
      if (viewMode === "isolated" && isolated.has(key)) {
        activateIsolatedTab(key);
        renderPanels();
        statusEl.innerHTML = isolatedStatusHead(key);
      }
    });
    bar.insertBefore(b, addBtn);
    return b;
  };

  // Runtime mode = the ART-running aggregate view. Only one tab — there is no
  // meaningful per-dex split when classes have already been merged with
  // first-wins resolution. Per-dex inspection lives in Isolated.
  if (viewMode === "runtime") {
    const dumpCount = dumpedSources.length;
    const dumpHint = dumpCount ? ` <span class="n" style="background:#da363344;color:#ff9a8c">+${dumpCount} dump${dumpCount === 1 ? "" : "s"}</span>` : "";
    const baseLabel = originalSource ? escAttr(originalSource.label) : "all";
    makeTab(`<span class="ico">▦</span>${baseLabel}${dumpHint}`, "all", {
      count: allClasses.length,
      title: `Runtime view — the APK's classes*.dex loaded in order` +
             (dumpCount ? `, then ${dumpCount} dumped dex(es) patched on top (their classes win collisions, mirroring ART after a packer unpack)` : "") +
             `. Switch to Isolated to inspect each dex in isolation.`,
    });
    return;
  }
  // Isolated: one tab per loaded dex, no aggregate.
  for (const d of dexInfo) {
    const icon = d.dump ? "📦" : "📄";
    const labelHtml = `<span class="ico">${icon}</span>` + escAttr(d.sourceLabel);
    if (!d.valid) {
      makeTab(labelHtml, "x-" + d.dex_id, { bad: true, title: "rejected at load: " + (d.reason || "verification failed") });
      continue;
    }
    const tip = d.dump
      ? `runtime-dumped dex (dex_id ${d.dex_id}) — inspected in isolation`
      : `dex_id ${d.dex_id} (${d.count} declared classes) — inspected in isolation`;
    makeTab(labelHtml, d.dex_id, { count: d.count, dump: d.dump, title: tip });
  }
}
function escAttr(s) {
  return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}

// Network-indicator / permission status pills (composed from current totals).
function statusPills() {
  const iocPill = (iocTotals && iocTotals.total)
    ? ` · <span class="pill bad" title="distinct network indicators recovered from dex strings">⚑ ${iocTotals.total} IOC${iocTotals.total === 1 ? "" : "s"}</span>`
    : ` · <span class="pill ok">no IOCs</span>`;
  const permPill = permPending
    ? ` · <span class="pill" style="background:#8b949e22;color:var(--muted)">🔓 analyzing…</span>`
    : (permTotals && permTotals.perms)
      ? ` · <span class="pill bad" title="dangerous permissions exercised through real gated-API calls">🔓 ${permTotals.perms} perm${permTotals.perms === 1 ? "" : "s"}</span>`
      : "";
  return iocPill + permPill;
}

// Deferred dangerous-permission caller mapping (the expensive L2 step).
async function analyzePerms(statusHead) {
  permIndex = []; permTotals = null; permPending = true;
  renderPermPanel();
  try {
    if (!dangerMap) {
      dangerMap = await fetch("dangerous_perm_api.json").then(r => r.ok ? r.json() : {}).catch(() => ({}));
    }
    await new Promise(r => setTimeout(r, 0));
    computePerms(dk);
  } catch (e) { console.error("permission mapping failed:", e); permTotals = null; }
  permPending = false;
  renderPermPanel();
  statusEl.innerHTML = statusHead + statusPills();
}

// ---- class list as a path-compressed, lazy package tree ----
const listEl = $("#classlist"), countEl = $("#count");

function buildTree(classes) {
  const root = { seg:"", children:new Map(), classes:[], count:0 };
  for (const desc of classes) {
    const inner = desc.replace(/^L/, "").replace(/;$/, "");   // com/foo/Bar$Inner
