<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>dexllm — in-browser DEX/APK decompiler</title>
<style>
  :root {
    --bg:#0d1117; --panel:#161b22; --border:#30363d; --fg:#c9d1d9;
    --muted:#8b949e; --accent:#58a6ff; --ok:#3fb950; --bad:#f85149;
    --hl:#1f6feb33;
  }
  * { box-sizing:border-box; }
  html,body { height:100%; margin:0; }
  body {
    background:var(--bg); color:var(--fg); font:13px/1.5 "SF Mono",
    ui-monospace,"Cascadia Code",Menlo,Consolas,monospace;
    display:flex; flex-direction:column;
  }
  header {
    padding:10px 16px; border-bottom:1px solid var(--border);
    background:var(--panel); display:flex; align-items:center; gap:14px;
    flex-wrap:wrap;
  }
  header h1 { font-size:15px; margin:0; font-weight:600; }
  header h1 span { color:var(--accent); }
  .ver {
    font-size:11px; color:var(--muted); text-decoration:none;
    padding:2px 7px; border:1px solid var(--border); border-radius:10px;
    font-family:inherit; white-space:nowrap;
  }
  .ver:hover { color:var(--accent); border-color:var(--accent); }
  .ver code { font:inherit; color:var(--fg); }
  .sub { color:var(--muted); font-size:11px; }
  #status { margin-left:auto; font-size:12px; color:var(--muted); }
  #status b { color:var(--fg); }
  .pill { padding:1px 7px; border-radius:10px; font-size:11px; }
  .pill.ok { background:#23863633; color:var(--ok); }
  .pill.bad { background:#da363333; color:var(--bad); }

  #drop {
    flex:1; display:flex; align-items:center; justify-content:center;
    flex-direction:column; gap:10px; margin:24px; border:2px dashed var(--border);
    border-radius:12px; color:var(--muted); cursor:pointer; text-align:center;
  }
  #drop.drag { border-color:var(--accent); background:var(--hl); color:var(--fg); }
  #drop .big { font-size:20px; color:var(--fg); }
  #drop input { display:none; }

  main { flex:1; display:none; min-height:0; }
  main.show { display:flex; }
  #sidebar {
    width:380px; min-width:240px; border-right:1px solid var(--border);
    display:flex; flex-direction:column; background:var(--panel);
  }
  #search {
    margin:8px; padding:7px 9px; background:var(--bg); border:1px solid var(--border);
    color:var(--fg); border-radius:6px; font:inherit;
  }
  #search:focus { outline:none; border-color:var(--accent); }
  #count { padding:0 12px 6px; color:var(--muted); font-size:11px; }
  #classlist { overflow:auto; flex:1; }
  .cls {
    padding:4px 12px; cursor:pointer; white-space:nowrap; overflow:hidden;
    text-overflow:ellipsis; border-left:2px solid transparent;
  }
  .cls:hover { background:#ffffff0a; }
  .cls.sel { background:var(--hl); border-left-color:var(--accent); color:#fff; }
  .pkg {
    padding:4px 12px; cursor:pointer; white-space:nowrap; overflow:hidden;
    text-overflow:ellipsis; user-select:none;
  }
  .pkg:hover { background:#ffffff0a; }
  .pkg .tw { display:inline-block; width:12px; color:var(--muted); }
  .pkg .pl { color:#d2a8ff; }
  .pkg .cnt { color:var(--muted); font-size:11px; margin-left:7px; }

  /* ---- IOC (static C2 / network-indicator) markers ---- */
  .ioc-badge {
    display:inline-block; margin-left:7px; padding:0 6px; border-radius:9px;
    font-size:10px; font-weight:600; line-height:16px; vertical-align:middle;
    background:#da363333; color:var(--bad); border:1px solid #f8514955;
  }
  .pkg .ioc-badge { font-weight:500; }
  #iocbar {
    border-bottom:1px solid var(--border); background:#161b22; padding:0;
    max-height:30vh; overflow:auto;
  }
  #iocbar.empty { display:none; }
  #iocbar .iochd {
    padding:7px 14px; color:var(--muted); font-size:11px;
    display:flex; align-items:center; gap:8px; flex-wrap:wrap;
  }
  #iocbar .iochd b { color:var(--bad); }
  .iocrow { padding:3px 14px 3px 14px; display:flex; gap:8px; align-items:baseline; }
  .iocrow .cat {
    flex:0 0 64px; text-align:right; font-size:10px; text-transform:uppercase;
    letter-spacing:.04em; padding-top:1px;
  }
  .iocrow .vals { display:flex; flex-wrap:wrap; gap:5px; }
  .iocpill {
    font-size:11px; padding:1px 7px; border-radius:10px; word-break:break-all;
    border:1px solid var(--border); background:#0d1117;
  }
  .iocpill.copied { outline:1px solid var(--accent); }
  .cat-urls,   .iocpill.urls   { color:#f85149; }
  .cat-ips,    .iocpill.ips    { color:#ffa657; }
  .cat-domains,.iocpill.domains{ color:#e3b341; }
  .cat-onion,  .iocpill.onion  { color:#d2a8ff; }
  .cat-emails, .iocpill.emails { color:#56d4dd; }
  .iocpill.urls{border-color:#f8514955;} .iocpill.ips{border-color:#ffa65755;}
  .iocpill.domains{border-color:#e3b34155;} .iocpill.onion{border-color:#d2a8ff55;}
  .iocpill.emails{border-color:#56d4dd55;}

  /* ---- right-side global IOC panel ---- */
  #iocpanel {
    width:340px; min-width:240px; border-left:1px solid var(--border);
    background:var(--panel); display:flex; flex-direction:column; min-height:0;
  }
  #iocpanel.empty { display:none; }
  .iocphd {
    padding:9px 12px; border-bottom:1px solid var(--border); font-size:12px;
    color:var(--fg); display:flex; align-items:center; gap:8px;
  }
  .ipcount {
    background:#da363333; color:var(--bad); border:1px solid #f8514955;
    border-radius:9px; padding:0 7px; font-size:11px; font-weight:600;
  }
  #iocfilter {
    margin:8px; padding:6px 9px; background:var(--bg); border:1px solid var(--border);
    color:var(--fg); border-radius:6px; font:inherit;
  }
  #iocfilter:focus { outline:none; border-color:var(--accent); }
  #iocpanelbody { overflow:auto; flex:1; padding-bottom:8px; }
  .iocgrp {
    padding:7px 12px 3px; font-size:10px; text-transform:uppercase;
    letter-spacing:.05em; position:sticky; top:0; background:var(--panel);
  }
  .iocitem {
    display:flex; align-items:baseline; gap:8px; padding:4px 12px; cursor:pointer;
    border-left:2px solid transparent;
  }
  .iocitem:hover { background:#ffffff0a; border-left-color:var(--accent); }
  .iocitem .ival { flex:1; word-break:break-all; font-size:12px; }
  .iocitem .icnt { color:var(--muted); font-size:11px; white-space:nowrap; }
  .iocitem.urls .ival{color:#f85149;} .iocitem.ips .ival{color:#ffa657;}
  .iocitem.domains .ival{color:#e3b341;} .iocitem.onion .ival{color:#d2a8ff;}
  .iocitem.emails .ival{color:#56d4dd;}
  .isub { background:#0d1117; border-left:2px solid var(--accent); }
  .isubitem {
    padding:4px 12px 4px 22px; font-size:11px; color:var(--muted); cursor:pointer;
    white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
  }
  .isubitem:hover { background:#ffffff0a; color:var(--fg); }
  .isubhint { padding:2px 12px 4px 22px; font-size:10px; color:var(--muted); }

  #viewer { flex:1; display:flex; flex-direction:column; min-width:0; }
  #vhead {
    padding:8px 14px; border-bottom:1px solid var(--border); color:var(--muted);
    font-size:12px; display:flex; gap:10px; align-items:center;
  }
  #vhead .name { color:var(--fg); }
  #code { flex:1; overflow:auto; margin:0; padding:14px 18px; white-space:pre;
    tab-size:4; -webkit-overflow-scrolling:touch; }
  .placeholder { color:var(--muted); padding:24px; }
  a { color:var(--accent); }

  /* ---- Java syntax highlight tokens (hues spread across the wheel) ---- */
  .tk-key { color:#ff7b72; }                       /* keywords     — red    */
  .tk-typ { color:#ffa657; }                       /* type/class   — orange */
  .tk-ann { color:#e3b341; }                       /* @annotation  — gold   */
  .tk-str { color:#7ee787; }                       /* strings      — green  */
  .tk-con { color:#56d4dd; }                       /* CONSTANTS    — cyan   */
  .tk-num { color:#79c0ff; }                       /* numbers      — blue   */
  .tk-fun { color:#d2a8ff; }                       /* methods      — purple */
  .tk-var { color:#9cdcfe; }                       /* variables/fields — light blue */
  .tk-lit { color:#f778ba; font-style:italic; }    /* true/false/null — magenta */
  .tk-com { color:#8b949e; font-style:italic; }    /* comments     — gray   */

  /* ---- mobile / narrow screens ---- */
  @media (max-width:720px) {
    body { font-size:12px; }
    header { padding:8px 12px; gap:8px; }
    header h1 { font-size:14px; }
    .sub { flex-basis:100%; order:3; }
    #status { margin-left:0; flex-basis:100%; order:4; }
    #drop { margin:14px; }
    #drop .big { font-size:16px; }

    main.show { flex-direction:column; }
    #sidebar {
      width:auto; min-width:0; max-height:38vh;
      border-right:none; border-bottom:1px solid var(--border);
    }
    #viewer { min-height:0; flex:1; }
    #code { padding:12px 14px; }
    .cls, .pkg { padding:7px 12px; }   /* bigger touch targets */
    #iocpanel {
      width:auto; min-width:0; max-height:34vh; order:5;
      border-left:none; border-top:1px solid var(--border);
    }
  }
</style>
</head>
<body>
<header>
  <h1>dex<span>llm</span></h1>
  <a class="ver" href="https://github.com/mobile-threat-hunter/dex-analyzer-for-llm/commit/441a04b"
     target="_blank" rel="noopener" title="dexllm commit this WASM was built from">
    v0.1.5 · <code>441a04b</code>
  </a>
  <span class="sub">in-browser DEX / APK decompiler · runs entirely on your device (WASM)</span>
  <div id="status">loading engine…</div>
</header>

<label id="drop" for="file">
  <div class="big">⬇ Drop a <b>.apk</b> / <b>.dex</b> / <b>.jar</b> here</div>
  <div>or click to choose a file — nothing is uploaded, decompilation runs locally</div>
  <input id="file" type="file" accept=".apk,.dex,.jar,.zip,application/octet-stream">
</label>

<main id="main">
  <div id="sidebar">
    <input id="search" placeholder="filter classes…" autocomplete="off">
    <div id="count"></div>
    <div id="classlist"></div>
  </div>
  <div id="viewer">
    <div id="vhead"><span class="name" id="vname">— select a class —</span>
      <span id="vmeta"></span></div>
    <div id="iocbar" class="empty"></div>
    <pre id="code"><div class="placeholder">Pick a class on the left to decompile it.</div></pre>
  </div>
  <div id="iocpanel" class="empty">
    <div class="iocphd">network indicators <span id="iocpaneln" class="ipcount">0</span></div>
    <input id="iocfilter" placeholder="filter indicators…" autocomplete="off">
    <div id="iocpanelbody"></div>
  </div>
</main>

<script src="dexllm.js"></script>
<script>
let Module = null, dk = null, allClasses = [], selectedEl = null;
// classDescriptor -> { urls:Set, ips:Set, domains:Set, emails:Set, onion:Set }
let classIoc = new Map();
let iocTotals = null;            // { urls, ips, domains, emails, onion, total }
let iocIndex = [];               // [{ value, cat, classes:[descriptor,…] }] — for the global panel
const $ = s => document.querySelector(s);
const statusEl = $("#status");

// ---- static network-IOC (C2) extraction ----------------------------------
// Port of dexllm.ioc.extract_iocs: classify the dex string pool into URLs /
// IPs / domains / emails / onion addresses, denoise framework package names
// that look like hosts, then tie each indicator back to its referencing class
// via the native batched L7 search (xrefStringsToClasses).
const IOC_CATS = ["urls", "ips", "domains", "emails", "onion"];
const RE_URL   = /\b(?:https?|ftp|wss?):\/\/[^\s"'<>\\]+/gi;
const RE_IPV4  = /\b(?:(?:25[0-5]|2[0-4]\d|1?\d?\d)\.){3}(?:25[0-5]|2[0-4]\d|1?\d?\d)(?::\d{1,5})?\b/g;
const RE_ONION = /\b[a-z2-7]{16}(?:[a-z2-7]{40})?\.onion\b/gi;
const RE_EMAIL = /\b[A-Za-z0-9._%+\-]+@[A-Za-z0-9.\-]+\.[A-Za-z]{2,}\b/g;
const IOC_TLDS = ("com|net|org|io|cn|ru|info|top|xyz|app|me|co|tk|cc|biz|site|online|club|" +
  "vip|pw|su|ws|cm|tv|gg|sh|dev|live|store|shop|fun|click|link|host|space|" +
  "pro|mobi|asia|uk|de|fr|jp|kr|in|br|us|nl|eu|ir|kz|ua|by|ng|id|vn|th|ph");
const RE_HOST  = new RegExp("\\b(?:[a-z0-9](?:[a-z0-9\\-]{0,61}[a-z0-9])?\\.)+(?:" + IOC_TLDS + ")\\b", "gi");
const RDN_ROOTS = new Set("com org net edu gov mil int".split(" "));
const PLATFORM_ROOTS = new Set("android androidx java javax kotlin kotlinx dalvik sun junit".split(" "));
const DROP_ROOTS = new Set([...RDN_ROOTS, ...PLATFORM_ROOTS]);
// XML-namespace / schema authority hosts. A URI like
// `http://schemas.android.com/apk/res/android` is an XML namespace identifier
// (xmlns:android=...), not a network endpoint — dropped from BOTH urls and
// domains even though urls are otherwise never denoised. Curated, not pattern-based.
const NAMESPACE_HOSTS = new Set([
  "schemas.android.com", "schemas.xmlsoap.org", "schemas.microsoft.com",
  "schemas.openxmlformats.org", "xmlpull.org", "www.xmlpull.org",
  "www.w3.org", "w3.org", "java.sun.com", "ns.adobe.com", "purl.org",
]);
const PKG_LABEL = /^[a-z0-9_$]+$/;

function dexPackagePrefixes(descriptors) {
  const pkgs = new Set();
  for (const s of descriptors) {
    const core = s.replace(/^\[+/, "");                       // arrays: [Lx; -> Lx;
    if (!(core.startsWith("L") && core.endsWith(";") && core.includes("/"))) continue;
    const labels = core.slice(1, -1).split("/").slice(0, -1).map(p => p.toLowerCase());
    if (!labels.length || !labels.every(p => PKG_LABEL.test(p))) continue;
    for (let i = 1; i <= labels.length; i++) pkgs.add(labels.slice(0, i).join("."));
  }
  return pkgs;
}
const isPackageLike = (host, pkgs) => {
  const low = host.toLowerCase();
  return NAMESPACE_HOSTS.has(low) || pkgs.has(low) || DROP_ROOTS.has(low.split(".")[0]);
};
const hostOf = url => ((url.split("://")[1] || "").split("/")[0].split("?")[0]);

function classifyStrings(strings, dexPkgs) {
  const b = { urls:new Set(), ips:new Set(), domains:new Set(), emails:new Set(), onion:new Set() };
  for (const s of strings) {
    let m;
    RE_URL.lastIndex = 0;   while ((m = RE_URL.exec(s))) {
      const url = m[0].replace(/[.,);]+$/, "");
      // XML namespace URIs (xmlns=...) are identifiers, not endpoints — drop.
      if (NAMESPACE_HOSTS.has(hostOf(url).split(":")[0].toLowerCase())) continue;
      b.urls.add(url);
    }
    RE_ONION.lastIndex = 0; while ((m = RE_ONION.exec(s))) b.onion.add(m[0].toLowerCase());
    RE_IPV4.lastIndex = 0;  while ((m = RE_IPV4.exec(s)))  b.ips.add(m[0]);
    RE_EMAIL.lastIndex = 0; while ((m = RE_EMAIL.exec(s))) b.emails.add(m[0]);
    RE_HOST.lastIndex = 0;  while ((m = RE_HOST.exec(s)))  {
      const host = m[0].toLowerCase();
      if (!isPackageLike(host, dexPkgs)) b.domains.add(host);
    }
  }
  for (const u of b.urls) {                                    // a URL's own host is high-confidence
    const h = hostOf(u).split(":")[0].toLowerCase();
    if (h.includes(".") && !isPackageLike(h, dexPkgs)) b.domains.add(h);
  }
  return b;
}

// Run the whole pipeline against the loaded dk; populates classIoc + iocTotals.
function computeIocs(dkInst, descriptors) {
  classIoc = new Map();
  iocIndex = [];
  const dexPkgs = dexPackagePrefixes(descriptors);
  const sv = dkInst.listStrings();
  const strings = [];
  for (let i = 0; i < sv.size(); i++) strings.push(sv.get(i));
  sv.delete();
  const buckets = classifyStrings(strings, dexPkgs);

  // flat, deduped value list + the category each value belongs to
  const valueCat = new Map();
  for (const cat of IOC_CATS) for (const v of buckets[cat]) if (!valueCat.has(v)) valueCat.set(v, cat);
  const values = [...valueCat.keys()];

  iocTotals = { total: values.length };
  for (const cat of IOC_CATS) iocTotals[cat] = buckets[cat].size;
  if (!values.length) return;

  // batched xref: value -> [classDescriptors]
  const VS = new Module.VectorString();
  for (const v of values) VS.push_back(v);
  let perValueClasses;
  try { perValueClasses = dkInst.xrefStringsToClasses(VS); }
  finally { VS.delete(); }

  iocIndex = [];
  for (let i = 0; i < values.length; i++) {
    const cat = valueCat.get(values[i]);
    const cls = perValueClasses[i] || [];
    iocIndex.push({ value: values[i], cat, classes: [...cls] });
    for (const cd of cls) {
      let e = classIoc.get(cd);
      if (!e) { e = { urls:new Set(), ips:new Set(), domains:new Set(), emails:new Set(), onion:new Set() }; classIoc.set(cd, e); }
      e[cat].add(values[i]);
    }
  }
}
const iocCountFor = cd => {
  const e = classIoc.get(cd); if (!e) return 0;
  let n = 0; for (const cat of IOC_CATS) n += e[cat].size; return n;
};

createDexllm().then(m => {
  Module = m;
  statusEl.innerHTML = "engine ready · <b>drop a file</b>";
}).catch(e => { statusEl.innerHTML = '<span class="pill bad">engine load failed</span>'; console.error(e); });

// ---- file intake ----
const drop = $("#drop");
$("#file").addEventListener("change", e => { if (e.target.files[0]) loadFile(e.target.files[0]); });
["dragenter","dragover"].forEach(ev => drop.addEventListener(ev, e => { e.preventDefault(); drop.classList.add("drag"); }));
["dragleave","drop"].forEach(ev => drop.addEventListener(ev, e => { e.preventDefault(); drop.classList.remove("drag"); }));
drop.addEventListener("drop", e => { const f = e.dataTransfer.files[0]; if (f) loadFile(f); });

async function loadFile(file) {
  if (!Module) { alert("engine still loading…"); return; }
  statusEl.innerHTML = `parsing <b>${file.name}</b>…`;
  const buf = new Uint8Array(await file.arrayBuffer());
  try { Module.FS.writeFile("/input.bin", buf); } catch (_) {
    try { Module.FS.unlink("/input.bin"); } catch (_) {} Module.FS.writeFile("/input.bin", buf);
  }
  if (dk) { try { dk.delete(); } catch (_) {} dk = null; }

  let t0 = performance.now();
  try {
    dk = new Module.DexKit("/input.bin");
  } catch (err) {
    const msg = (Module.getExceptionMessage && err && err.excPtr != null)
      ? Module.getExceptionMessage(err.excPtr) : err;
    statusEl.innerHTML = `<span class="pill bad">load failed</span> ${msg}`;
    return;
  }
  const loadMs = (performance.now() - t0).toFixed(0);

  // verifier verdict
  const rep = dk.verifyReport();
  let nbad = 0; const n = rep.length;
  for (let i = 0; i < n; i++) if (!rep[i].valid) nbad++;
  const vpill = nbad === 0
    ? `<span class="pill ok">verified ✓</span>`
    : `<span class="pill bad">${nbad}/${n} dex rejected</span>`;

  // class list
  const vec = dk.listClasses();
  allClasses = [];
  for (let i = 0; i < vec.size(); i++) allClasses.push(vec.get(i));
  vec.delete();
  allClasses.sort();

  // static network-IOC (C2) extraction — tied back to the referencing classes
  statusEl.innerHTML = `<b>${file.name}</b> · scanning for network indicators…`;
  classIoc = new Map(); iocTotals = null;
  try {
    const descriptors = allClasses.slice();
    const tv = dk.listExternalTypeRefs();
    for (let i = 0; i < tv.size(); i++) descriptors.push(tv.get(i));
    tv.delete();
    await new Promise(r => setTimeout(r, 0));   // let the "scanning…" status paint
    computeIocs(dk, descriptors);
  } catch (e) { console.error("IOC extraction failed:", e); iocTotals = null; }

  const iocPill = (iocTotals && iocTotals.total)
    ? ` · <span class="pill bad" title="distinct network indicators recovered from dex strings">⚑ ${iocTotals.total} IOC${iocTotals.total === 1 ? "" : "s"}</span>`
    : ` · <span class="pill ok">no IOCs</span>`;
  statusEl.innerHTML = `<b>${file.name}</b> · ${dk.dexCount()} dex · ${allClasses.length} classes · ${loadMs}ms ${vpill}${iocPill}`;
  $("#main").classList.add("show");
  drop.style.display = "none";
  selectedEl = null;
  $("#vname").textContent = "— select a class —"; $("#vmeta").textContent = "";
  $("#iocbar").classList.add("empty"); $("#iocbar").innerHTML = "";
  $("#code").innerHTML = '<div class="placeholder">Pick a class on the left to decompile it.' +
    (iocTotals && iocTotals.total ? ' Classes that reference a network indicator are marked <span class="ioc-badge">⚑</span>, or click any indicator on the right to jump to it.' : "") + '</div>';
  $("#iocfilter").value = "";
  renderIocPanel();
  renderList("");
  $("#search").value = ""; $("#search").focus();
}

// ---- class list as a path-compressed, lazy package tree ----
const listEl = $("#classlist"), countEl = $("#count");

function buildTree(classes) {
  const root = { seg:"", children:new Map(), classes:[], count:0 };
  for (const desc of classes) {
    const inner = desc.replace(/^L/, "").replace(/;$/, "");   // com/foo/Bar$Inner
    const slash = inner.lastIndexOf("/");
    const pkg = slash >= 0 ? inner.slice(0, slash) : "";
    const name = slash >= 0 ? inner.slice(slash + 1) : inner;
    let node = root;
    if (pkg) for (const seg of pkg.split("/")) {
      let c = node.children.get(seg);
      if (!c) { c = { seg, children:new Map(), classes:[], count:0 }; node.children.set(seg, c); }
      node = c;
    }
    node.classes.push({ desc, label:name });
  }
  (function count(n){
    let t = n.classes.length, ic = 0;
    for (const c of n.classes) ic += iocCountFor(c.desc);
    for (const c of n.children.values()) { count(c); t += c.count; ic += c.iocCount; }
    n.count = t; n.iocCount = ic; return n;
  })(root);
  return root;
}

// collapse a single-child package chain (com>google>android) into "com.google.android"
function compress(node) {
  let label = node.seg, cur = node;
  while (cur.children.size === 1 && cur.classes.length === 0) {
    const child = cur.children.values().next().value;
    label += "." + child.seg; cur = child;
  }
  return { label, node:cur };
}

function appendChildren(node, container, depth, expand) {
  const pkgs = [...node.children.values()].sort((a,b)=>a.seg.localeCompare(b.seg));
  for (const p of pkgs) {
    const { label, node:eff } = compress(p);
    container.appendChild(makePkgRow(label, eff, depth, expand));
  }
  const cs = node.classes.slice().sort((a,b)=>a.label.localeCompare(b.label));
  for (const c of cs) container.appendChild(makeClassRow(c, depth));
}

function makePkgRow(label, eff, depth, expand) {
  const wrap = document.createElement("div");
  const row = document.createElement("div");
  row.className = "pkg";
  row.style.paddingLeft = (8 + depth * 14) + "px";
  const tw = document.createElement("span"); tw.className = "tw"; tw.textContent = "▶";
  const pl = document.createElement("span"); pl.className = "pl"; pl.textContent = label;
  const cnt = document.createElement("span"); cnt.className = "cnt"; cnt.textContent = eff.count;
  row.append(tw, pl, cnt);
  if (eff.iocCount > 0) {
    const b = document.createElement("span"); b.className = "ioc-badge";
    b.textContent = "⚑ " + eff.iocCount;
    b.title = eff.iocCount + " network-indicator reference(s) under this package";
    row.append(b);
  }
  const kids = document.createElement("div"); kids.className = "kids"; kids.style.display = "none";
  let built = false;
  const toggle = open => {
    kids.style.display = open ? "block" : "none";
    tw.textContent = open ? "▼" : "▶";
    if (open && !built) { appendChildren(eff, kids, depth + 1, expand); built = true; }
  };
  row.onclick = () => toggle(kids.style.display === "none");
  wrap.append(row, kids);
  if (expand) toggle(true);
  return wrap;
}

function makeClassRow(c, depth) {
  const div = document.createElement("div");
  div.className = "cls";
  div.style.paddingLeft = (8 + depth * 14 + 16) + "px";
  const name = document.createElement("span"); name.textContent = c.label;
  div.append(name); div.title = c.desc;
  const n = iocCountFor(c.desc);
  if (n > 0) {
    const b = document.createElement("span"); b.className = "ioc-badge";
    b.textContent = "⚑ " + n; b.title = iocTitle(c.desc);
    div.append(b);
  }
  div.onclick = () => selectClass(c.desc, div);
  return div;
}

// Plain-text summary of a class's indicators (for badge tooltips).
function iocTitle(cd) {
  const e = classIoc.get(cd); if (!e) return "";
  return IOC_CATS.filter(cat => e[cat].size)
    .map(cat => `${cat}: ${[...e[cat]].join(", ")}`).join("\n");
}

function renderList(filter) {
  const f = filter.toLowerCase().trim();
  const items = f ? allClasses.filter(c => c.toLowerCase().includes(f)) : allClasses;
  countEl.textContent = `${items.length} / ${allClasses.length} classes`;
  // filtered & small → auto-expand so matching classes are visible;
  // otherwise show collapsed top-level packages.
  const expand = !!f && items.length <= 1500;
  const root = buildTree(items);
  listEl.innerHTML = "";
  const frag = document.createDocumentFragment();
  appendChildren(root, frag, 0, expand);
  listEl.appendChild(frag);
}
let searchTimer = null;
$("#search").addEventListener("input", e => {
  clearTimeout(searchTimer);
  searchTimer = setTimeout(() => renderList(e.target.value), 140);
});
let iocFilterTimer = null;
$("#iocfilter").addEventListener("input", () => {
  clearTimeout(iocFilterTimer);
  iocFilterTimer = setTimeout(renderIocPanel, 120);
});

// ---- lightweight Java syntax highlighter (dependency-free) ----
const KW_PRIM = new Set("boolean byte char double float int long short void var".split(" "));
const KW_LIT  = new Set(["true", "false", "null"]);
const JAVA_KW = new Set(("abstract assert break case catch class const continue default do " +
  "else enum extends final finally for goto if implements import instanceof interface native " +
  "new package private protected public return static strictfp super switch synchronized this " +
  "throw throws transient try volatile while").split(" "));
function escHtml(s) {
  return s.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
}
const HL_RE = new RegExp([
  "(\\/\\/[^\\n]*|\\/\\*[\\s\\S]*?\\*\\/)",                                  // 1 comment
  "(\"(?:\\\\.|[^\"\\\\])*\"|'(?:\\\\.|[^'\\\\])*')",                        // 2 string/char
  "(@[A-Za-z_$][\\w$]*)",                                                    // 3 annotation
  "(0[xX][\\da-fA-F_]+[lL]?|\\b\\d[\\d_]*\\.?[\\d_]*(?:[eE][+\\-]?\\d+)?[fFdDlL]?)", // 4 number
  "([A-Za-z_$][\\w$]*)"                                                      // 5 identifier
].join("|"), "g");
function highlight(code) {
  let out = "", last = 0, m;
  HL_RE.lastIndex = 0;
  while ((m = HL_RE.exec(code))) {
    out += escHtml(code.slice(last, m.index));
    last = HL_RE.lastIndex;
    const t = m[0];
    let cls = null;
    if (m[1]) cls = "tk-com";
    else if (m[2]) cls = "tk-str";
    else if (m[3]) cls = "tk-ann";
    else if (m[4]) cls = "tk-num";
    else {                                       // identifier
      if (KW_PRIM.has(t)) cls = "tk-typ";        // primitives group with class types
      else if (KW_LIT.has(t)) cls = "tk-lit";    // true / false / null
      else if (JAVA_KW.has(t)) cls = "tk-key";
      else if (t.length > 1 && /^[A-Z][A-Z0-9_]*$/.test(t)) cls = "tk-con";
      else if (/^[A-Z]/.test(t)) cls = "tk-typ"; // Type / constructor (even if a call)
      else if (/^([vp]\d|[ms][A-Z])/.test(t)) cls = "tk-var";   // v1/p5 locals+params, mX/sX fields
      else if (/^\s*\(/.test(code.slice(last))) cls = "tk-fun"; // lowercase + '(' = method
    }
    out += cls ? `<span class="${cls}">${escHtml(t)}</span>` : escHtml(t);
  }
  out += escHtml(code.slice(last));
  return out;
}

// ---- decompile ----
function renderIocBar(cls) {
  const bar = $("#iocbar");
  const e = classIoc.get(cls);
  bar.innerHTML = "";
  if (!e) { bar.classList.add("empty"); return; }
  const total = IOC_CATS.reduce((n, c) => n + e[c].size, 0);
  if (!total) { bar.classList.add("empty"); return; }
  bar.classList.remove("empty");
  const hd = document.createElement("div"); hd.className = "iochd";
  hd.innerHTML = `⚑ <b>${total}</b> network indicator${total === 1 ? "" : "s"} referenced by this class ` +
    `<span style="color:var(--muted)">· recovered statically from dex strings · click to copy</span>`;
  bar.appendChild(hd);
  for (const cat of IOC_CATS) {
    if (!e[cat].size) continue;
    const row = document.createElement("div"); row.className = "iocrow";
    const c = document.createElement("span"); c.className = "cat cat-" + cat; c.textContent = cat;
    const vals = document.createElement("span"); vals.className = "vals";
    for (const v of [...e[cat]].sort()) {
      const p = document.createElement("span"); p.className = "iocpill " + cat;
      p.textContent = v; p.title = "click to copy";
      p.onclick = () => { navigator.clipboard?.writeText(v); p.classList.add("copied"); setTimeout(() => p.classList.remove("copied"), 600); };
      vals.appendChild(p);
    }
    row.append(c, vals); bar.appendChild(row);
  }
}

// ---- global IOC panel (right): every indicator, click to jump to its class ----
function renderIocPanel() {
  const panel = $("#iocpanel"), body = $("#iocpanelbody");
  if (!iocIndex.length) { panel.classList.add("empty"); body.innerHTML = ""; $("#iocpaneln").textContent = "0"; return; }
  panel.classList.remove("empty");
  $("#iocpaneln").textContent = iocIndex.length;
  const filt = ($("#iocfilter").value || "").toLowerCase().trim();
  body.innerHTML = "";
  let shown = 0;
  for (const cat of IOC_CATS) {
    const items = iocIndex
      .filter(x => x.cat === cat && (!filt || x.value.toLowerCase().includes(filt)))
      .sort((a, b) => a.value.localeCompare(b.value));
    if (!items.length) continue;
    const h = document.createElement("div"); h.className = "iocgrp cat-" + cat;
    h.textContent = `${cat} (${items.length})`; body.appendChild(h);
    for (const it of items) { body.appendChild(makeIocItem(it)); shown++; }
  }
  if (!shown) { const d = document.createElement("div"); d.className = "iocgrp"; d.style.color = "var(--muted)"; d.textContent = "no match"; body.appendChild(d); }
}

function makeIocItem(it) {
  const wrap = document.createElement("div");
  const row = document.createElement("div"); row.className = "iocitem " + it.cat;
  const val = document.createElement("span"); val.className = "ival"; val.textContent = it.value;
  const cnt = document.createElement("span"); cnt.className = "icnt";
  const n = it.classes.length;
  cnt.textContent = n === 0 ? "— no class" : n === 1 ? "→" : "▶ " + n + " classes";
  row.append(val, cnt);
  row.title = it.value + (n ? `\n${n} referencing class(es)` : "\n(not tied to a class)");
  if (n === 1) {
    row.onclick = () => navigateToClass(it.classes[0]);
  } else if (n > 1) {
    const sub = document.createElement("div"); sub.className = "isub"; sub.style.display = "none";
    const hint = document.createElement("div"); hint.className = "isubhint";
    hint.textContent = "referenced by — pick one:"; sub.appendChild(hint);
    for (const cd of it.classes.slice().sort()) {
      const s = document.createElement("div"); s.className = "isubitem"; s.textContent = cd; s.title = cd;
      s.onclick = ev => { ev.stopPropagation(); navigateToClass(cd); };
      sub.appendChild(s);
    }
    row.onclick = () => {
      const open = sub.style.display === "none";
      sub.style.display = open ? "block" : "none";
      cnt.textContent = (open ? "▼ " : "▶ ") + n + " classes";
    };
    wrap.append(row, sub);
    return wrap;
  }
  wrap.appendChild(row);
  return wrap;
}

// Jump to (decompile + reveal) a class by descriptor. Highlights its row in the
// left tree when that row is currently visible; always shows the code + IOC bar.
function navigateToClass(desc) {
  const row = [...listEl.querySelectorAll(".cls")].find(e => e.title === desc);
  selectClass(desc, row || null);
  if (row) row.scrollIntoView({ block: "center", behavior: "smooth" });
}

function selectClass(cls, el) {
  if (selectedEl) selectedEl.classList.remove("sel");
  selectedEl = el || null;
  if (el) el.classList.add("sel");
  $("#vname").textContent = cls;
  $("#vmeta").textContent = "decompiling…";
  $("#code").textContent = "";
  renderIocBar(cls);
  // let the UI paint before the (synchronous) decompile
  setTimeout(() => {
    let t0 = performance.now();
    let java;
    try { java = dk.decompileClassJava(cls); }
    catch (err) {
      const msg = (Module.getExceptionMessage && err && err.excPtr != null)
        ? Module.getExceptionMessage(err.excPtr) : err;
      java = "// decompile failed: " + msg;
    }
    const ms = (performance.now() - t0).toFixed(0);
    $("#vmeta").textContent = `${java.length} chars · ${ms}ms`;
    $("#code").innerHTML = highlight(java || "// (empty — external/abstract class)");
  }, 0);
}
</script>
